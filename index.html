<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Thu Mua – Panya</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--ac:#d65600;--as:rgba(214,86,0,0.1)}
body{font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;color:#18181b}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#cfccc4;border-radius:6px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}
input::placeholder,textarea::placeholder{color:#a1a1aa}
button{font-family:inherit;cursor:pointer}
button:focus{outline:none}
input,select,textarea{font-family:inherit}
.app{display:flex;height:100vh;width:100%}
/* SIDEBAR */
.sb{width:250px;flex-shrink:0;height:100%;display:flex;flex-direction:column;background:#fff;border-right:1px solid #ececec;padding:20px 16px;overflow-y:auto}
.sb-brand{display:flex;align-items:center;gap:11px;padding:6px 8px 22px}
.sb-logo{width:36px;height:36px;border-radius:10px;background:var(--ac);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;flex-shrink:0}
.navitem{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;color:#71717a;transition:all .15s;border:none;background:transparent;width:100%;text-align:left}
.navitem.active{background:var(--as);color:var(--ac)}
.navbadge{background:var(--ac);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 6px;margin-left:auto}
.editbtn{border:none;background:transparent;cursor:pointer;color:#a1a1aa;display:inline-flex;padding:0;width:20px;height:20px;align-items:center}
.alertbox{margin-top:18px;background:#f7f7f7;border:1px solid #ececec;border-radius:12px;padding:14px}
.alert-item{display:flex;align-items:flex-start;gap:9px;cursor:pointer;margin-bottom:8px}
.alert-dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0}
/* MAIN */
.main{flex:1;height:100%;display:flex;flex-direction:column;min-width:0}
.hd{flex-shrink:0;height:82px;border-bottom:1px solid #e0d5cc;display:flex;align-items:center;justify-content:space-between;padding:0 32px;gap:20px}
.hd-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.content{flex:1;overflow-y:auto;padding:28px 32px 44px}
.pill{font-size:11px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.card{background:#fff;border:1px solid #ececec;border-radius:14px}
.badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap}
.kpi{background:#fff;border:1px solid #ececec;border-radius:13px;padding:13px 15px;display:flex;align-items:center;gap:12px}
.kpi-ic{width:38px;height:38px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.tab{display:inline-flex;align-items:center;gap:8px;height:36px;padding:0 14px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #ececec;background:#fff;color:#52525b}
.tab.active{border-color:var(--ac);background:var(--ac);color:#fff}
.tab-count{font-size:11.5px;font-weight:800;min-width:20px;height:18px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 6px;background:#f1f1f2;color:#71717a}
.tab.active .tab-count{background:rgba(255,255,255,.25);color:#fff}
.btn-primary{height:36px;padding:0 16px;background:var(--ac);color:#fff;border:none;border-radius:10px;font-size:13.5px;font-weight:700;display:inline-flex;align-items:center;gap:7px}
.inp{height:36px;border:1px solid #ececec;border-radius:9px;padding:0 12px;font-size:13px;outline:none;background:#f7f7f6}
.cbox{width:20px;height:20px;border-radius:6px;border:2px solid #cfcfd4;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;flex-shrink:0}
.cbox.on{background:var(--ac);border-color:var(--ac)}
.drawer-field{font-size:11px;font-weight:700;color:#a1a1aa;text-transform:uppercase;letter-spacing:.04em}
.drawer-inp{width:100%;height:40px;margin-top:6px;border:1px solid #ececec;border-radius:10px;padding:0 12px;font-size:14px;font-weight:600;outline:none;color:#18181b}
.statusmenu{position:absolute;z-index:40;background:#fff;border:1px solid #ececec;border-radius:11px;box-shadow:0 10px 28px rgba(0,0,0,.14);padding:5px;min-width:140px}
.statusmenu-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#3f3f46}
.hidden{display:none!important}
svg{flex-shrink:0}
</style>

function isOD(iso){return !!iso&&iso<TODAY;}

};

/* =================== STATE =================== */
var S={view:'overview',orders:[],tasks:[],notes:'',brand:'Panya',user:'Andrew',wCity:'hcm',
  oFilter:'all',oSearch:'',oPoF:'',oHdF:'',oNpF:'',oGF:'',oSel:[],oOpen:null,oMenu:null,
  tFilter:'all',tDateF:'',tSel:[],tMenu:null,tEditId:null,tEditDateId:null,dlPrompt:null,
  calY:2026,calM:5,calSel:TODAY,calPicker:false,calPickerY:2026,
  wMenu:false,nid:100};

function save_local(){try{localStorage.setItem('panya_dash_v4',JSON.stringify(syncData()));}catch(e){}}
function save(){save_local();cloudPushDebounced();}
function load(){
  try{var s=localStorage.getItem('panya_dash_v4');if(s){var d=JSON.parse(s);
    S.orders=d.orders||INIT_ORDERS.slice();S.tasks=d.tasks||INIT_TASKS.slice();
    S.notes=d.notes||'';S.brand=d.brand||'Panya';S.user=d.user||'Andrew';S.wCity=d.wCity||'hcm';
  }else{S.orders=INIT_ORDERS.slice();S.tasks=INIT_TASKS.slice();}}
  catch(e){S.orders=INIT_ORDERS.slice();S.tasks=INIT_TASKS.slice();}
}

/* =================== CLOUD SYNC (JSONBin.io) =================== */
var SYNC={key:'',bin:'',on:false,status:'off',timer:null};
var SYNC_OPEN=false;
var JB='https://api.jsonbin.io/v3/b';
function loadSync(){try{var s=localStorage.getItem('panya_sync_cfg');if(s){var d=JSON.parse(s);SYNC.key=d.key||'';SYNC.bin=d.bin||'';SYNC.on=!!(SYNC.key&&SYNC.bin);if(SYNC.on)SYNC.status='idle';}}catch(e){}}
function saveSyncCfg(){try{localStorage.setItem('panya_sync_cfg',JSON.stringify({key:SYNC.key,bin:SYNC.bin}));}catch(e){}}
function syncData(){return {orders:S.orders,tasks:S.tasks,notes:S.notes,brand:S.brand,user:S.user,wCity:S.wCity};}
function applyData(d){if(!d)return;S.orders=d.orders||S.orders;S.tasks=d.tasks||S.tasks;S.notes=d.notes||'';S.brand=d.brand||'Panya';S.user=d.user||'Andrew';S.wCity=d.wCity||'hcm';}
function syncInfo(){
  if(!SYNC.on)return{c:'#a1a1aa',t:'Chưa bật đồng bộ'};
  if(SYNC.status==='syncing')return{c:'#b45309',t:'Đang đồng bộ…'};
  if(SYNC.status==='error')return{c:'#dc2626',t:'Lỗi — bấm để sửa'};
  if(SYNC.status==='ok')return{c:'#047857',t:'Đã đồng bộ ✓'};
  return{c:'#2563eb',t:'Đồng bộ đám mây'};
}
function updateSyncBadge(){var i=syncInfo();var d=el('sync-dot'),l=el('sync-label');if(d)d.style.background=i.c;if(l){l.textContent=i.t;l.style.color=SYNC.on?i.c:'#71717a';}}
function setSyncStatus(st){SYNC.status=st;updateSyncBadge();}
function cloudPull(cb){
  if(!SYNC.on){if(cb)cb(false);return;}
  setSyncStatus('syncing');
  fetch(JB+'/'+encodeURIComponent(SYNC.bin)+'/latest',{headers:{'X-Master-Key':SYNC.key,'X-Bin-Meta':'false'}})
   .then(function(r){if(!r.ok)throw 0;return r.json();})
   .then(function(rec){
      if(rec&&(rec.orders||rec.tasks||rec.notes!==undefined)){applyData(rec);save_local();}
      else{cloudPush();}
      setSyncStatus('ok');if(cb)cb(true);})
   .catch(function(){setSyncStatus('error');if(cb)cb(false);});
}
function cloudPush(){
  if(!SYNC.on)return;
  setSyncStatus('syncing');
  fetch(JB+'/'+encodeURIComponent(SYNC.bin),{method:'PUT',headers:{'X-Master-Key':SYNC.key,'Content-Type':'application/json','X-Bin-Versioning':'false'},body:JSON.stringify(syncData())})
   .then(function(r){if(!r.ok)throw 0;return r.json();})
   .then(function(){setSyncStatus('ok');})
   .catch(function(){setSyncStatus('error');});
}
function cloudPushDebounced(){if(!SYNC.on)return;if(SYNC.timer)clearTimeout(SYNC.timer);SYNC.timer=setTimeout(cloudPush,900);}
function cloudCreateBin(cb){
  fetch(JB,{method:'POST',headers:{'X-Master-Key':SYNC.key,'Content-Type':'application/json','X-Bin-Name':'panya-dashboard','X-Bin-Versioning':'false'},body:JSON.stringify(syncData())})
   .then(function(r){if(!r.ok)throw 0;return r.json();})
   .then(function(j){if(cb)cb(true,j&&j.metadata&&j.metadata.id);})
   .catch(function(){if(cb)cb(false);});
}

  plus:'M12 5v14M5 12h14'
};

/* =================== HELPERS =================== */
function el(id){return document.getElementById(id);}
function tasksByStatus(st){return S.tasks.filter(function(t){return tSt(t)===st;});}

/* =================== RENDER ROOT =================== */
function render(){
  var bgs={overview:'#fce4cf',orders:'#dde8f1',tasks:'#e2ecd9',calendar:'#ede5d4'};
  var app=el('app');
  app.style.background=bgs[S.view]||'#f6f6f5';

    renderSidebar()+
    '<main class="main">'+renderHeader()+'<div class="content" id="content">'+renderContent()+'</div></main>'+

}

/* =================== SIDEBAR =================== */
function renderSidebar(){
  var nav=[['overview','Tổng quan',I.grid],['orders','Đơn đặt hàng',I.box],['tasks','Công việc',I.check],['calendar','Lịch & Deadline',I.cal]];
  var badges={orders:S.orders.filter(function(o){return o.status==='cho_xn'||o.status==='da_xn';}).length,tasks:S.tasks.filter(function(t){return !t.done;}).length};
  var navHtml=nav.map(function(n){
    var active=S.view===n[0];
    var b=badges[n[0]];
    return '<button class="navitem'+(active?' active':'')+'" data-nav="'+n[0]+'">'+ic(n[2],18)+'<span style="flex:1">'+n[1]+'</span>'+(b?'<span class="navbadge">'+b+'</span>':'')+'</button>';
  }).join('');

  // alerts
  var tAlerts=S.tasks.filter(function(t){return !t.done&&t.due&&diff(t.due)<=3;}).sort(function(a,b){return diff(a.due)-diff(b.due);}).slice(0,3);
  var oAlerts=S.orders.filter(function(o){return o.ngayXuat&&o.status!=='da_giao'&&o.status!=='huy'&&diff(o.ngayXuat)<=7;}).sort(function(a,b){return diff(a.ngayXuat)-diff(b.ngayXuat);}).slice(0,3);
  var total=tAlerts.length+oAlerts.length;
  var alertHtml='';
  if(tAlerts.length){alertHtml+='<div style="font-size:10.5px;font-weight:800;letter-spacing:.05em;color:#71717a;text-transform:uppercase;margin:12px 0 7px">Công việc đến hạn</div>';
    tAlerts.forEach(function(t){var d=diff(t.due);var c=d<=0?'#dc2626':'#d97706';var lb=d<0?'Quá hạn '+Math.abs(d)+' ngày':d===0?'Hôm nay':'Còn '+d+' ngày';
      alertHtml+='<div class="alert-item" data-nav="tasks"><span class="alert-dot" style="background:'+c+'"></span><div style="min-width:0;flex:1"><div style="font-size:12.5px;font-weight:700;color:#18181b;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.title)+'</div><div style="font-size:11px;font-weight:700;margin-top:2px;color:'+c+'">'+lb+'</div></div></div>';});}
  if(oAlerts.length){alertHtml+='<div style="font-size:10.5px;font-weight:800;letter-spacing:.05em;color:#71717a;text-transform:uppercase;margin:6px 0 7px">Đơn sắp giao</div>';
    oAlerts.forEach(function(o){var d=diff(o.ngayXuat);var c=d<=0?'#dc2626':'#d97706';var lb=d<0?'Quá hạn '+Math.abs(d)+' ngày':d===0?'Giao hôm nay':'Giao trong '+d+' ngày';
      alertHtml+='<div class="alert-item" data-nav="orders"><span class="alert-dot" style="background:'+c+'"></span><div style="min-width:0;flex:1"><div style="font-size:12.5px;font-weight:700;color:#18181b;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(o.name)+'</div><div style="font-size:11px;font-weight:700;margin-top:2px;color:'+c+'">'+lb+'</div></div></div>';});}
  if(total===0)alertHtml='<div style="font-size:11.5px;font-weight:600;color:#a1a1aa;margin-top:8px">Không có việc gấp 🎉</div>';

/* =================== ORDERS =================== */
function ordersFiltered(){
  return S.orders.filter(function(o){
    if(S.oFilter!=='all'&&o.status!==S.oFilter)return false;
    if(S.oSearch&&(o.name+o.ncc+o.po+o.detail).toLowerCase().indexOf(S.oSearch.toLowerCase())<0)return false;
    if(S.oPoF&&(o.po||'').toLowerCase().indexOf(S.oPoF.toLowerCase())<0)return false;
    if(S.oHdF&&(o.hopDong||'').toLowerCase().indexOf(S.oHdF.toLowerCase())<0)return false;
    if(S.oNpF&&o.ngayNhanPO!==S.oNpF)return false;
    if(S.oGF&&o.ngayXuat!==S.oGF)return false;
    return true;
  });
}

/* =================== CALENDAR =================== */
function renderCalendar(){
  var vy=S.calY,vm=S.calM;
  var fd=new Date(vy,vm,1).getDay();var off=(fd+6)%7;
  var dim=new Date(vy,vm+1,0).getDate();
  var bk={};
  function ab(d,item){if(!bk[d])bk[d]=[];bk[d].push(item);}
  S.orders.forEach(function(o){if(!o.ngayXuat)return;var p=o.ngayXuat.split('-').map(Number);if(p[0]===vy&&p[1]-1===vm&&o.status!=='da_giao'&&o.status!=='huy')ab(p[2],{k:'po',t:o.name,ov:isOD(o.ngayXuat)});});
  S.tasks.forEach(function(t){if(!t.due||t.done)return;var p=t.due.split('-').map(Number);if(p[0]===vy&&p[1]-1===vm)ab(p[2],{k:'task',t:t.title,ov:isOD(t.due)});});

  var sYM=S.calSel.slice(0,7);var cYM=vy+'-'+pad(vm+1);
  var selEvs=[];
  if(sYM===cYM){
    S.orders.filter(function(o){return o.ngayXuat===S.calSel&&o.status!=='da_giao'&&o.status!=='huy';}).forEach(function(o){selEvs.push({k:'po',t:o.name,sub:'NCC '+o.ncc});});
    S.tasks.filter(function(t){return t.due===S.calSel&&!t.done;}).forEach(function(t){selEvs.push({k:'task',t:t.title,sub:t.ncc?'NCC '+t.ncc:'Nội bộ'});});
  }

  var wdHtml=WDS.map(function(w){return '<div style="text-align:center;font-size:11.5px;font-weight:700;color:#a1a1aa;text-transform:uppercase">'+w+'</div>';}).join('');
  var cells='';
  for(var i=0;i<off;i++)cells+='<div></div>';
  for(var d=1;d<=dim;d++){
    var iso=vy+'-'+pad(vm+1)+'-'+pad(d);
    var isT=iso===TODAY;var isSel=iso===S.calSel;var evs=bk[d]||[];
    var oN=0,tN=0,ovN=0;
    evs.forEach(function(e){if(e.ov)ovN++;else if(e.k==='po')oN++;else tN++;});
    var bg='#fafafa',bc='transparent',dc='#52525b';
    if(isSel){bg=AS;bc=AC;dc=AC;}else if(isT){bg='rgba(214,86,0,0.06)';dc=AC;}
    var dots='';
    if(evs.length){dots='<div style="display:flex;align-items:center;gap:6px;margin-top:auto;padding-top:3px">';
      if(ovN)dots+='<span style="font-size:11px;font-weight:800;color:#dc2626;display:inline-flex;align-items:center;gap:3px"><span style="width:7px;height:7px;border-radius:50%;background:#dc2626"></span>'+ovN+'</span>';
      if(oN)dots+='<span style="font-size:11px;font-weight:800;color:#2563eb;display:inline-flex;align-items:center;gap:3px"><span style="width:7px;height:7px;border-radius:50%;background:#2563eb"></span>'+oN+'</span>';
      if(tN)dots+='<span style="font-size:11px;font-weight:800;color:#16a34a;display:inline-flex;align-items:center;gap:3px"><span style="width:7px;height:7px;border-radius:50%;background:#16a34a"></span>'+tN+'</span>';
      dots+='</div>';}
    var firstEv=evs.length?'<div style="font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:'+(ovN?'#dc2626':oN?'#2563eb':'#16a34a')+';margin-top:2px">'+esc(evs[0].t)+'</div>':'';
    cells+='<div class="cal-day" data-iso="'+iso+'" style="min-height:84px;display:flex;flex-direction:column;gap:2px;padding:7px 7px 6px;border-radius:10px;cursor:pointer;border:1px solid '+bc+';background:'+bg+';overflow:hidden"><span style="font-size:13px;font-weight:700;color:'+dc+'">'+d+'</span>'+firstEv+dots+'</div>';
  }

  var picker='';
  if(S.calPicker){var py=S.calPickerY;
    picker='<div class="statusmenu" style="top:calc(100% + 8px);right:0;width:290px;padding:14px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><span id="cal-py-prev" style="width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#52525b">'+ic(I.chevL,15)+'</span><span style="font-size:16px;font-weight:800">'+py+'</span><span id="cal-py-next" style="width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#52525b">'+ic(I.chevR,15)+'</span></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px">'+
    MTHS.map(function(n,idx){var a=idx===vm&&py===vy;return '<div class="cal-mon" data-mon="'+idx+'" style="text-align:center;padding:9px 0;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;background:'+(a?AC:'#f7f7f6')+';color:'+(a?'#fff':'#3f3f46')+'">'+n.replace('Tháng ','Th ')+'</div>';}).join('')+'</div></div>';}

  var evsHtml=selEvs.map(function(e){return '<div style="display:flex;align-items:flex-start;gap:11px;padding:12px 16px;border-top:1px solid #f2f2f2"><span style="width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:'+(e.k==='po'?'#e8f0fe':'#e3f6ec')+';color:'+(e.k==='po'?'#1d4ed8':'#16a34a')+'">'+ic(e.k==='po'?I.box:I.check,16,e.k==='po'?'#1d4ed8':'#16a34a')+'</span><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;line-height:1.35">'+esc(e.t)+'</div><div style="font-size:11.5px;color:#a1a1aa;font-weight:600;margin-top:3px">'+esc(e.sub)+'</div></div></div>';}).join('');
  if(selEvs.length===0)evsHtml='<div style="padding:34px 16px;text-align:center;color:#c4c4c8;font-size:13px;font-weight:600;border-top:1px solid #f2f2f2">Không có deadline nào trong ngày này.</div>';

  var legend=[['#2563eb','Đơn đặt hàng'],['#16a34a','Công việc'],['#dc2626','Quá hạn']].map(function(l){return '<span style="display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:#71717a"><span style="width:9px;height:9px;border-radius:3px;background:'+l[0]+';flex-shrink:0"></span>'+l[1]+'</span>';}).join('');

  return '<div style="display:grid;grid-template-columns:2.4fr 1fr;gap:16px;align-items:start">'+
    '<div class="card" style="padding:22px 24px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px"><div style="background:'+AS+';border-radius:12px;padding:9px 15px"><div style="font-size:11px;font-weight:800;color:'+AC+';text-transform:uppercase;letter-spacing:.05em">Hôm nay</div><div style="font-size:16px;font-weight:800;color:'+AC+';margin-top:2px">'+fmtFull(TODAY)+'</div></div>'+
    '<div style="display:flex;align-items:center;gap:6px;position:relative"><span id="cal-prev" style="width:34px;height:34px;border-radius:9px;border:1px solid #ececec;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#52525b">'+ic(I.chevL,16)+'</span><span id="cal-picker-btn" style="font-size:16px;font-weight:800;cursor:pointer;padding:6px 12px;border-radius:9px;min-width:150px;text-align:center">'+MTHS[vm]+' '+vy+'</span><span id="cal-next" style="width:34px;height:34px;border-radius:9px;border:1px solid #ececec;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#52525b">'+ic(I.chevR,16)+'</span>'+picker+'</div></div>'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-bottom:8px">'+wdHtml+'</div>'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:7px">'+cells+'</div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:16px;margin-top:18px;padding-top:14px;border-top:1px solid #f2f2f2">'+legend+'</div></div>'+
    '<div class="card" style="overflow:hidden"><div style="padding:16px 16px 6px"><div style="font-size:14px;font-weight:800">'+fmtFull(S.calSel)+'</div><div style="font-size:12px;color:#a1a1aa;font-weight:600;margin-top:3px">'+(selEvs.length?selEvs.length+' mục đến hạn':'Không có deadline')+'</div></div>'+evsHtml+'</div></div>';
}

  // Deadline prompt
  if(S.dlPrompt){
    html+='<div style="position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center"><div id="dl-bg" style="position:absolute;inset:0;background:rgba(24,24,27,.34)"></div>'+
      '<div style="position:relative;width:380px;max-width:92vw;background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.24);padding:24px"><div style="font-size:16px;font-weight:800">Chọn deadline cho việc</div><div style="font-size:13px;color:#71717a;font-weight:600;margin-top:5px;line-height:1.45">"'+esc(S.dlPrompt.title)+'"</div>'+
      '<input id="dl-date" type="date" style="width:100%;height:46px;border:1px solid #ececec;border-radius:11px;padding:0 14px;font-size:14px;outline:none;margin-top:16px;color:#18181b">'+
      '<div style="display:flex;gap:10px;margin-top:18px"><button id="dl-skip" style="flex:1;height:44px;background:#f4f4f5;color:#52525b;border:none;border-radius:11px;font-size:14px;font-weight:700">Bỏ qua</button><button id="dl-save" style="flex:1;height:44px;background:'+AC+';color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700">Lưu deadline</button></div></div></div>';
  }
  // Sync settings
  if(SYNC_OPEN){
    var si=syncInfo();
    html+='<div style="position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center"><div id="sync-bg" style="position:absolute;inset:0;background:rgba(24,24,27,.4)"></div>'+
      '<div style="position:relative;width:440px;max-width:94vw;max-height:90vh;overflow-y:auto;background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.26);padding:24px">'+
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:14px"><div><div style="font-size:18px;font-weight:800">☁️ Đồng bộ đám mây</div><div style="font-size:12.5px;color:#71717a;font-weight:600;margin-top:4px;line-height:1.5">Lưu dữ liệu online để mọi máy &amp; trình duyệt đều thấy chung.</div></div><span id="sync-close" style="cursor:pointer;color:#a1a1aa;flex-shrink:0">'+ic(I.close,20)+'</span></div>'+
      '<div style="margin-top:14px;display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700"><span style="width:9px;height:9px;border-radius:50%;background:'+si.c+'"></span><span style="color:'+si.c+'">'+si.t+'</span></div>'+
      '<ol style="margin:14px 0 0;padding-left:20px;font-size:12.5px;color:#52525b;font-weight:600;line-height:1.75">'+
        '<li>Đăng ký miễn phí tại <b>jsonbin.io</b></li>'+
        '<li>Mở mục <b>API Keys</b> → copy <b>Master Key</b>, dán vào ô dưới</li>'+
        '<li>Máy đầu tiên: bấm <b>+ Tạo kho mới</b> để tạo Bin ID</li>'+
        '<li>Máy/trình duyệt khác: dán <b>cùng</b> Master Key + Bin ID rồi bấm Lưu</li>'+
      '</ol>'+
      '<label style="display:block;margin-top:16px"><span class="drawer-field">Master Key</span><input id="sync-key" class="drawer-inp" placeholder="$2a$10$..." value="'+esc(SYNC.key)+'"></label>'+
      '<label style="display:block;margin-top:12px"><span class="drawer-field">Bin ID</span><div style="display:flex;gap:8px;margin-top:6px"><input id="sync-bin" class="drawer-inp" style="margin-top:0;flex:1" placeholder="VD: 65a1...c3" value="'+esc(SYNC.bin)+'"><button id="sync-create" style="flex-shrink:0;height:40px;padding:0 14px;background:'+AS+';color:'+AC+';border:1px solid '+AC+';border-radius:10px;font-size:13px;font-weight:700;white-space:nowrap">+ Tạo kho mới</button></div></label>'+
      '<div style="display:flex;gap:10px;margin-top:20px">'+
        (SYNC.on?'<button id="sync-off" style="height:44px;padding:0 16px;background:#fdecec;color:#dc2626;border:none;border-radius:11px;font-size:13.5px;font-weight:700">Tắt</button>':'')+
        '<button id="sync-pull" style="height:44px;padding:0 16px;background:#f4f4f5;color:#52525b;border:none;border-radius:11px;font-size:13.5px;font-weight:700">⤓ Tải về</button>'+
        '<button id="sync-save" style="flex:1;height:44px;background:'+AC+';color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700">Lưu &amp; Đồng bộ</button>'+
      '</div></div></div>';
  }
  return html;
}

/* =================== EVENTS =================== */
function on(sel,evt,fn){var nodes=document.querySelectorAll(sel);for(var i=0;i<nodes.length;i++){nodes[i].addEventListener(evt,fn);}}
function updOrder(id,patch){for(var i=0;i<S.orders.length;i++){if(S.orders[i].id===id){for(var k in patch)S.orders[i][k]=patch[k];}}save();}
function updTask(id,patch){for(var i=0;i<S.tasks.length;i++){if(S.tasks[i].id===id){for(var k in patch)S.tasks[i][k]=patch[k];}}save();}

function attachEvents(){
  // NAV
  on('[data-nav]','click',function(){S.view=this.getAttribute('data-nav');S.oMenu=null;S.tMenu=null;render();});

  // EDIT brand/user
  on('[data-edit]','click',function(){
    var which=this.getAttribute('data-edit');
    var cur=which==='brand'?S.brand:S.user;
    var v=prompt(which==='brand'?'Tên thương hiệu:':'Tên của bạn:',cur);
    if(v!=null&&v.trim()){if(which==='brand')S.brand=v.trim();else S.user=v.trim();save();render();}
  });

  if(S.view==='overview')attachOverview();
  if(S.view==='orders')attachOrders();
  if(S.view==='tasks')attachTasks();
  if(S.view==='calendar')attachCalendar();
  attachOverlays();
}

function attachOverview(){
  var notes=el('notes-area');
  if(notes)notes.addEventListener('input',function(){S.notes=this.value;save();});
  var aiBtn=el('ai-ask'),aiInp=el('ai-inp'),aiAns=el('ai-ans');
  function ask(){var q=aiInp.value.trim();if(!q)return;aiAns.innerHTML='<div style="display:flex;align-items:flex-start;gap:12px;margin-top:12px;padding:12px 14px;border-radius:12px;background:'+AS+';border:1px solid rgba(214,86,0,.15)"><div style="width:26px;height:26px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:'+AC+';color:#fff">'+ic(I.star,14,'#fff')+'</div><div style="flex:1;font-size:13.5px;line-height:1.6;color:#3f3f46;font-weight:500">Trợ lý AI sẽ trả lời tại đây sau khi tích hợp Claude API. Câu hỏi: "'+esc(q)+'"</div></div>';}
  if(aiBtn)aiBtn.addEventListener('click',ask);
  if(aiInp)aiInp.addEventListener('keydown',function(e){if(e.key==='Enter')ask();});
  var wbtn=el('wcity-btn');
  if(wbtn)wbtn.addEventListener('click',function(e){e.stopPropagation();S.wMenu=!S.wMenu;render();});
  on('.wcity-opt','click',function(){S.wCity=this.getAttribute('data-city');S.wMenu=false;save();render();});
}

function attachOrders(){
  on('[data-ofilter]','click',function(){S.oFilter=this.getAttribute('data-ofilter');S.oMenu=null;render();});
  var s=el('o-search');if(s)s.addEventListener('input',function(){S.oSearch=this.value;rerenderContent();restoreFocus('o-search',this.value.length);});
  var pof=el('o-pof');if(pof)pof.addEventListener('input',function(){S.oPoF=this.value;rerenderContent();restoreFocus('o-pof',this.value.length);});
  var hdf=el('o-hdf');if(hdf)hdf.addEventListener('input',function(){S.oHdF=this.value;rerenderContent();restoreFocus('o-hdf',this.value.length);});
  var npf=el('o-npf');if(npf)npf.addEventListener('change',function(){S.oNpF=this.value;render();});
  var gf=el('o-gf');if(gf)gf.addEventListener('change',function(){S.oGF=this.value;render();});
  var cl=el('o-clear');if(cl)cl.addEventListener('click',function(){S.oSearch='';S.oPoF='';S.oHdF='';S.oNpF='';S.oGF='';render();});
  var nw=el('o-new');if(nw)nw.addEventListener('click',function(){var id=S.nid++;S.orders.unshift({id:id,po:'',hopDong:'',name:'Đơn đặt hàng mới',ncc:'',detail:'',status:'cho_xn',ngayNhanPO:TODAY,ngayXuat:'',note:''});S.oOpen=id;save();render();});
  on('.ocb','click',function(){var id=+this.getAttribute('data-id');var i=S.oSel.indexOf(id);if(i>=0)S.oSel.splice(i,1);else S.oSel.push(id);render();});
  on('.oopen','click',function(){S.oOpen=+this.getAttribute('data-id');render();});
  on('.ostatus-btn','click',function(e){e.stopPropagation();var id=+this.getAttribute('data-id');S.oMenu=S.oMenu===id?null:id;render();});
  on('.ostatus-opt','click',function(){updOrder(+this.getAttribute('data-id'),{status:this.getAttribute('data-status')});S.oMenu=null;render();});
  on('.obulk-status','click',function(){var st=this.getAttribute('data-status');S.oSel.forEach(function(id){updOrder(id,{status:st});});S.oSel=[];render();});
  var obd=el('obulk-del');if(obd)obd.addEventListener('click',function(){S.orders=S.orders.filter(function(o){return S.oSel.indexOf(o.id)<0;});S.oSel=[];save();render();});
  var obc=el('obulk-clear');if(obc)obc.addEventListener('click',function(){S.oSel=[];render();});
}

function attachTasks(){
  on('[data-tfilter]','click',function(){S.tFilter=this.getAttribute('data-tfilter');S.tMenu=null;render();});
  var nw=el('t-new');var add=el('t-add');
  function addTask(){var v=nw.value.trim();if(!v)return;var id=S.nid++;S.tasks.unshift({id:id,title:v,done:false,due:null,ncc:''});nw.value='';S.dlPrompt={id:id,title:v};save();render();}
  if(add)add.addEventListener('click',addTask);
  if(nw)nw.addEventListener('keydown',function(e){if(e.key==='Enter')addTask();});
  var df=el('t-datef');if(df)df.addEventListener('change',function(){S.tDateF=this.value;render();});
  var dfc=el('t-datef-clear');if(dfc)dfc.addEventListener('click',function(){S.tDateF='';render();});
  on('.tcb','click',function(){var id=+this.getAttribute('data-id');var i=S.tSel.indexOf(id);if(i>=0)S.tSel.splice(i,1);else S.tSel.push(id);render();});
  on('.t-title','click',function(){S.tEditId=+this.getAttribute('data-id');render();var inp=document.querySelector('.t-edit-inp');if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}});
  on('.t-edit-inp','keydown',function(e){var id=+this.getAttribute('data-id');if(e.key==='Enter'){updTask(id,{title:this.value.trim()||S.tasks.filter(function(t){return t.id===id;})[0].title});S.tEditId=null;render();}else if(e.key==='Escape'){S.tEditId=null;render();}});
  on('.t-edit-inp','blur',function(){var id=+this.getAttribute('data-id');updTask(id,{title:this.value.trim()||S.tasks.filter(function(t){return t.id===id;})[0].title});S.tEditId=null;render();});
  on('.tstatus-btn','click',function(e){e.stopPropagation();var id=+this.getAttribute('data-id');S.tMenu=S.tMenu===id?null:id;render();});
  on('.tstatus-opt','click',function(){updTask(+this.getAttribute('data-id'),{done:this.getAttribute('data-done')==='true'});S.tMenu=null;render();});
  on('.t-date','click',function(){S.tEditDateId=+this.getAttribute('data-id');render();var inp=document.querySelector('.t-date-inp');if(inp)inp.focus();});
  on('.t-date-inp','change',function(){updTask(+this.getAttribute('data-id'),{due:this.value||null});S.tEditDateId=null;render();});
  on('.t-date-inp','blur',function(){S.tEditDateId=null;render();});
  on('.stat-row','click',function(){S.tFilter=this.getAttribute('data-tfilter');render();});
  var bd=el('t-bulk-done');if(bd)bd.addEventListener('click',function(){S.tSel.forEach(function(id){updTask(id,{done:true});});S.tSel=[];render();});
  var bdel=el('t-bulk-del');if(bdel)bdel.addEventListener('click',function(){S.tasks=S.tasks.filter(function(t){return S.tSel.indexOf(t.id)<0;});S.tSel=[];save();render();});
  var bc=el('t-bulk-clear');if(bc)bc.addEventListener('click',function(){S.tSel=[];render();});
}

function attachCalendar(){
  var prev=el('cal-prev');if(prev)prev.addEventListener('click',function(){var m=S.calM-1,y=S.calY;if(m<0){m=11;y--;}S.calM=m;S.calY=y;render();});
  var next=el('cal-next');if(next)next.addEventListener('click',function(){var m=S.calM+1,y=S.calY;if(m>11){m=0;y++;}S.calM=m;S.calY=y;render();});
  var pb=el('cal-picker-btn');if(pb)pb.addEventListener('click',function(e){e.stopPropagation();S.calPicker=!S.calPicker;S.calPickerY=S.calY;render();});
  var pyp=el('cal-py-prev');if(pyp)pyp.addEventListener('click',function(e){e.stopPropagation();S.calPickerY--;render();});
  var pyn=el('cal-py-next');if(pyn)pyn.addEventListener('click',function(e){e.stopPropagation();S.calPickerY++;render();});
  on('.cal-mon','click',function(){S.calM=+this.getAttribute('data-mon');S.calY=S.calPickerY;S.calPicker=false;render();});
  on('.cal-day','click',function(){S.calSel=this.getAttribute('data-iso');render();});
}

function attachOverlays(){
  // drawer
  on('.dr-field','input',function(){var f=this.getAttribute('data-field');updOrder(S.oOpen,{});S.orders.filter(function(o){return o.id===S.oOpen;})[0][f]=this.value;save();
    if(f==='status'||f==='name'){render();}});
  on('.dr-field','change',function(){var f=this.getAttribute('data-field');if(f==='status'){updOrder(S.oOpen,{status:this.value});render();}});
  var dbg=el('drawer-bg');if(dbg)dbg.addEventListener('click',function(){S.oOpen=null;render();});
  var dc=el('drawer-close');if(dc)dc.addEventListener('click',function(){S.oOpen=null;render();});
  var ddel=el('drawer-del');if(ddel)ddel.addEventListener('click',function(){var id=S.oOpen;S.orders=S.orders.filter(function(o){return o.id!==id;});S.oOpen=null;save();render();});
  // deadline prompt
  var dlbg=el('dl-bg');if(dlbg)dlbg.addEventListener('click',function(){S.dlPrompt=null;render();});
  var dls=el('dl-skip');if(dls)dls.addEventListener('click',function(){S.dlPrompt=null;render();});
  var dlsave=el('dl-save');if(dlsave)dlsave.addEventListener('click',function(){var v=el('dl-date').value;if(v)updTask(S.dlPrompt.id,{due:v});S.dlPrompt=null;render();});
  // sync settings
  var syb=el('sync-btn');if(syb)syb.addEventListener('click',function(){SYNC_OPEN=true;render();});
  if(SYNC_OPEN){
    function closeS(){SYNC_OPEN=false;render();}
    var sclose=el('sync-close');if(sclose)sclose.addEventListener('click',closeS);
    var sbg=el('sync-bg');if(sbg)sbg.addEventListener('click',closeS);
    var screate=el('sync-create');if(screate)screate.addEventListener('click',function(){
      var k=el('sync-key').value.trim();if(!k){alert('Hãy dán Master Key trước.');return;}
      SYNC.key=k;this.textContent='Đang tạo…';this.disabled=true;
      cloudCreateBin(function(ok,id){if(ok&&id){SYNC.bin=id;}else{alert('Không tạo được kho. Kiểm tra lại Master Key.');}render();});
    });
    var ssave=el('sync-save');if(ssave)ssave.addEventListener('click',function(){
      SYNC.key=el('sync-key').value.trim();SYNC.bin=el('sync-bin').value.trim();SYNC.on=!!(SYNC.key&&SYNC.bin);
      if(!SYNC.on){alert('Cần cả Master Key và Bin ID.');return;}
      saveSyncCfg();SYNC_OPEN=false;render();
      cloudPull(function(ok){render();if(!ok)alert('Đã lưu nhưng chưa kết nối được. Kiểm tra Master Key / Bin ID / mạng.');});
    });
    var soff=el('sync-off');if(soff)soff.addEventListener('click',function(){if(!confirm('Tắt đồng bộ? Dữ liệu vẫn còn trên máy này.'))return;SYNC.on=false;SYNC.status='off';try{localStorage.removeItem('panya_sync_cfg');}catch(e){}SYNC_OPEN=false;render();});
    var spull=el('sync-pull');if(spull)spull.addEventListener('click',function(){
      SYNC.key=el('sync-key').value.trim();SYNC.bin=el('sync-bin').value.trim();SYNC.on=!!(SYNC.key&&SYNC.bin);
      if(!SYNC.on){alert('Cần Master Key và Bin ID.');return;}
      saveSyncCfg();cloudPull(function(ok){render();if(!ok)alert('Không tải được. Kiểm tra lại thông tin.');});
    });
  }
}

// Re-render chỉ phần content (giữ focus cho input search)
function rerenderContent(){var c=el('content');if(c){c.innerHTML=renderContent();attachEvents();}}
function restoreFocus(id,pos){var n=el(id);if(n){n.focus();try{n.setSelectionRange(pos,pos);}catch(e){}}}

// Đóng menu khi click ra ngoài
document.addEventListener('click',function(e){
  var changed=false;
  if(S.oMenu!==null&&!e.target.closest('.ostatus-btn')&&!e.target.closest('.statusmenu')){S.oMenu=null;changed=true;}
  if(S.tMenu!==null&&!e.target.closest('.tstatus-btn')&&!e.target.closest('.statusmenu')){S.tMenu=null;changed=true;}
  if(S.wMenu&&!e.target.closest('#wcity-btn')&&!e.target.closest('.wcity-opt')){S.wMenu=false;changed=true;}
  if(S.calPicker&&!e.target.closest('#cal-picker-btn')&&!e.target.closest('.statusmenu')){S.calPicker=false;changed=true;}
  if(changed)render();
});

/* =================== INIT =================== */
loadSync();
load();
render();
if(SYNC.on)cloudPull(function(ok){if(ok)render();});
</script>
