const tSt=t=>t.done?'done':isOD(t.due)?'overdue':'pending';

const MTHS=['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];

  {id:1,po:'PO 70988',hopDong:'',name:'Giao hàng Khay nhựa',ncc:'Sin Lan Hồ',detail:'Khay nhựa',status:'da_xn',ngayNhanPO:'2026-06-08',ngayXuat:'2026-06-17',note:'Lịch giao hàng khay nhựa của Sin Lan Hồ.',docs:[]},
  {id:2,po:'PO 70972',hopDong:'',name:'Đóng cont Chậu cây',ncc:'Viwood',detail:'Chậu cây (1 container)',status:'da_giao',ngayNhanPO:'2026-06-02',ngayXuat:'2026-06-13',note:'Đóng container chậu cây từ NCC Viwood.',docs:[]},

  {id:4,po:'PO 70961',hopDong:'01/2026/CAMHD-PNA',name:'Hàng Rào CAMHD — Đợt 2/3',ncc:'CAMHD',detail:'286 thùng (~6.864 chiếc)',status:'da_xn',ngayNhanPO:'2026-06-03',ngayXuat:'2026-06-25',note:'Đợt 2/3 trong tổng đơn 858 thùng.',docs:[]},
  {id:5,po:'PO 70962',hopDong:'01/2026/CAMHD-PNA',name:'Hàng Rào CAMHD — Đợt 3/3',ncc:'CAMHD',detail:'286 thùng (~6.864 chiếc)',status:'cho_xn',ngayNhanPO:'2026-06-03',ngayXuat:'2026-07-15',note:'Đợt cuối, dự kiến 15/07.',docs:[]},
  {id:6,po:'PO 70955',hopDong:'003/06-2026/VWA-PNA',name:'Chuồng chim Green Roof Fly Thru',ncc:'Viwood Asia',detail:'2.205 cái · gỗ Sa Mộc',status:'da_xn',ngayNhanPO:'2026-06-05',ngayXuat:'2026-08-01',note:'HĐ 003/06-2026/VWA-PNA.',docs:[]},
];
const INIT_TASKS=[
  {id:1,title:'Gửi file quote Cainz: khay nhựa, chông sắt, PDF',done:false,due:'2026-06-19',ncc:'Cainz'},
  {id:2,title:'Tổng hợp báo giá đội sale gửi vào 1 file',done:false,due:'2026-06-17',ncc:''},
  {id:3,title:'Xuống CAMHD xem hàng rào gỗ',done:false,due:'2026-06-20',ncc:'CAMHD'},
  {id:4,title:'Nhắc A Đại gửi 2 báo giá',done:false,due:'2026-06-18',ncc:''},
  {id:5,title:'Nhắc c Mai in 2 chứng từ ký bổ sung',done:false,due:'2026-06-19',ncc:''},
  {id:6,title:'Remind báo giá Test ALDI từ Intertek',done:false,due:'2026-06-22',ncc:'Intertek'},
  {id:7,title:'Làm chứng từ thanh toán hàng rào gỗ trắng — CAMHD',done:true,due:'2026-06-15',ncc:'CAMHD'},
  {id:8,title:'Hoàn thiện báo giá ALDI (thêm file ALDI 2022)',done:true,due:'2026-06-15',ncc:'ALDI'},

const WEATHER={
  hcm:{name:'TP. Hồ Chí Minh',temp:32,hi:34,lo:26,hm:78,wind:'12 km/h',cond:'Mây rải rác, chiều có mưa rào',fc:[{t:'Sáng',c:29},{t:'Trưa',c:34},{t:'Chiều',c:30},{t:'Tối',c:27}]},
  hanoi:{name:'Hà Nội',temp:36,hi:38,lo:29,hm:65,wind:'9 km/h',cond:'Nắng nóng, oi bức',fc:[{t:'Sáng',c:31},{t:'Trưa',c:38},{t:'Chiều',c:35},{t:'Tối',c:30}]},
  vinhphuc:{name:'Vĩnh Phúc',temp:35,hi:37,lo:28,hm:70,wind:'11 km/h',cond:'Oi nóng, chiều có dông',fc:[{t:'Sáng',c:30},{t:'Trưa',c:37},{t:'Chiều',c:33},{t:'Tối',c:29}]},
  danang:{name:'Đà Nẵng',temp:34,hi:35,lo:27,hm:70,wind:'14 km/h',cond:'Trời nắng, ít mây',fc:[{t:'Sáng',c:30},{t:'Trưa',c:35},{t:'Chiều',c:33},{t:'Tối',c:28}]},
  cantho:{name:'Cần Thơ',temp:31,hi:33,lo:25,hm:82,wind:'10 km/h',cond:'Mây thay đổi, mưa dông vài nơi',fc:[{t:'Sáng',c:28},{t:'Trưa',c:33},{t:'Chiều',c:29},{t:'Tối',c:26}]},
};

/* ========== ICON ========== */
const Ic=({d,s=18,c='currentColor',sw=2})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;
const ChevD='M6 9l6 6 6-6';
const ChevL='M15 18l-6-6 6-6';
const ChevR='M9 18l6-6-6-6';
const CloseI='M18 6 6 18M6 6l12 12';
const EditI='M12 20h9 M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z';
const CheckI='M5 13l4 4L19 7';
const TrashI='M3 6h18 M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2 M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6';
const SendI='M22 2L11 13 M22 2l-7 20-4-9-9-4z';
const StarI='M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14l-5-4.87 6.91-1.01z';

/* ========== BADGE ========== */
const Bdg=({label,fg,bg})=><span style={{fontSize:11,fontWeight:800,color:fg,background:bg,padding:'3px 9px',borderRadius:20,whiteSpace:'nowrap'}}>{label}</span>;

/* ========== WEATHER ========== */
function WeatherWidget({city,setCity}){
  const[open,setOpen]=useState(false);
  const w=WEATHER[city]||WEATHER.hcm;
  return(
    <div style={{width:300,flexShrink:0,borderRadius:16,padding:'16px 18px',color:'#fff',background:'linear-gradient(135deg,#4f97dd,#2d6cb2)',boxShadow:'0 8px 22px rgba(45,108,178,.26)',display:'flex',flexDirection:'column',gap:0,position:'relative'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10}}>
        <div>
          <div style={{position:'relative'}}>
            <button onClick={()=>setOpen(!open)} style={{display:'flex',alignItems:'center',gap:6,background:'rgba(255,255,255,.18)',border:'1px solid rgba(255,255,255,.32)',color:'#fff',fontSize:12,fontWeight:800,fontFamily:'inherit',cursor:'pointer',padding:'5px 9px',borderRadius:999}}>
              {w.name} <Ic d={ChevD} s={12}/>
            </button>
            {open&&(
              <div style={{position:'absolute',top:'calc(100% + 6px)',left:0,zIndex:60,width:210,padding:7,borderRadius:13,background:'linear-gradient(150deg,#4a90d9,#255fa3)',boxShadow:'0 14px 34px rgba(20,60,110,.45)',border:'1px solid rgba(255,255,255,.22)'}}>
                <div style={{fontSize:10,fontWeight:800,letterSpacing:'0.07em',textTransform:'uppercase',color:'rgba(255,255,255,.65)',padding:'4px 11px 7px'}}>Chọn thành phố</div>
                {Object.entries(WEATHER).map(([k,v])=>(
                  <button key={k} onClick={()=>{setCity(k);setOpen(false);}} style={{display:'flex',alignItems:'center',gap:9,width:'100%',textAlign:'left',border:'none',cursor:'pointer',padding:'8px 11px',borderRadius:10,fontFamily:'inherit',fontSize:13,fontWeight:700,background:k===city?'rgba(255,255,255,.26)':'transparent',color:'rgba(255,255,255,.92)'}}>
                    <span style={{flex:1}}>{v.name}</span><span style={{fontWeight:800}}>{v.temp}°</span>
                  </button>
                ))}
              </div>
            )}
          </div>
          <div style={{fontSize:12,fontWeight:600,opacity:.9,marginTop:5}}>{w.cond}</div>
        </div>
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" strokeLinecap="round" style={{flexShrink:0}}>
          <circle cx="8.5" cy="8" r="3.4" fill="#ffe08a" stroke="#ffe08a"/>
          <path d="M8.5 1.5v1.4M8.5 13.1v1.4M2.8 8H1.4M15.6 8h-1.4" stroke="#ffe08a" strokeWidth="1.7"/>
          <path d="M17.5 21a4 4 0 0 0 0-8 5.5 5.5 0 0 0-10.4-1A3.6 3.6 0 0 0 7 21z" fill="#fff" stroke="#fff" strokeWidth="1.7"/>
        </svg>
      </div>
      <div style={{display:'flex',alignItems:'flex-end',gap:13,marginTop:6}}>
        <div style={{fontSize:44,fontWeight:800,lineHeight:.85,letterSpacing:'-.03em'}}>{w.temp}°</div>
        <div style={{fontSize:12,fontWeight:700,paddingBottom:4}}>
          <div>Cao {w.hi}° · Thấp {w.lo}°</div>
          <div style={{opacity:.85,marginTop:2}}>Độ ẩm {w.hm}% · Gió {w.wind}</div>
        </div>
      </div>
      <div style={{display:'flex',gap:6,marginTop:12}}>
        {w.fc.map((f,i)=>(
          <div key={i} style={{flex:1,background:'rgba(255,255,255,.16)',borderRadius:11,padding:'8px 4px',textAlign:'center'}}>
            <div style={{fontSize:10.5,fontWeight:700,opacity:.92}}>{f.t}</div>
            <div style={{fontSize:13,fontWeight:800,marginTop:6}}>{f.c}°</div>
          </div>
        ))}
      </div>
      {open&&<div onClick={()=>setOpen(false)} style={{position:'fixed',inset:0,zIndex:55}}/>}
    </div>
  );
}

/* ========== AI WIDGET ========== */
function AIWidget(){
  const[prompt,setPrompt]=useState('');
  const[answer,setAnswer]=useState(null);
  const[busy,setBusy]=useState(false);
  const ask=()=>{
    if(!prompt.trim()||busy)return;
    setBusy(true);setAnswer(null);
    setTimeout(()=>{
      setBusy(false);
      setAnswer(`Trợ lý AI sẽ trả lời tại đây sau khi tích hợp Claude API. Câu hỏi: "${prompt}"`);
    },700);
  };
  return(
    <div style={{flex:1,background:'#fff',border:'1px solid #ececec',borderRadius:16,padding:'18px 20px',backgroundImage:'linear-gradient(118deg,rgba(214,86,0,0.08),transparent 52%)'}}>
      <div style={{display:'flex',alignItems:'center',gap:13}}>
        <div style={{width:44,height:44,borderRadius:13,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',background:AC,color:'#fff',boxShadow:'0 7px 18px rgba(214,86,0,.3)'}}>
          <Ic d={StarI} s={22}/>
        </div>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:15,fontWeight:800}}>Trợ lý Thu Mua AI</span>
            <span style={{fontSize:10.5,fontWeight:800,textTransform:'uppercase',color:AC,background:AS,padding:'3px 8px',borderRadius:20}}>Beta</span>
          </div>
          <div style={{fontSize:12.5,color:'#71717a',fontWeight:600}}>Hỏi nhanh về đơn hàng, NCC & lịch giao</div>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8,border:'1px solid #e7e7e9',borderRadius:12,padding:'0 6px 0 14px',background:'#fdfdfc',marginTop:14}}>
        <input value={prompt} onChange={e=>setPrompt(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')ask();}} placeholder="Hỏi điều gì đó về công việc thu mua…" style={{flex:1,border:'none',outline:'none',background:'transparent',fontFamily:'inherit',fontSize:13.5,fontWeight:500,color:'#27272a',padding:'11px 0',minWidth:0}}/>
        <button onClick={ask} disabled={!prompt.trim()||busy} style={{display:'inline-flex',alignItems:'center',gap:6,fontFamily:'inherit',fontSize:13,fontWeight:800,border:'none',borderRadius:9,padding:'9px 14px',cursor:prompt.trim()&&!busy?'pointer':'default',color:'#fff',background:prompt.trim()&&!busy?AC:'#d4d4d8',transition:'all .14s'}}>
          <Ic d={SendI} s={15}/>{busy?'…':'Hỏi'}
        </button>
      </div>
      {answer&&(
        <div style={{display:'flex',alignItems:'flex-start',gap:12,marginTop:12,padding:'12px 14px',borderRadius:12,background:AS,border:'1px solid rgba(214,86,0,.15)'}}>
          <div style={{width:26,height:26,borderRadius:8,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',background:AC,color:'#fff'}}><Ic d={StarI} s={14}/></div>
          <div style={{flex:1,fontSize:13.5,lineHeight:1.6,color:'#3f3f46',fontWeight:500}}>{answer}</div>
        </div>
      )}
    </div>
  );
}

/* ========== SIDEBAR ========== */
function Sidebar({view,setView,orders,tasks,brandName,setBrand,userName,setUser}){
  const[eb,setEb]=useState(false);
  const[eu,setEu]=useState(false);
  const[tb,setTb]=useState(brandName);
  const[tu,setTu]=useState(userName);
  const nav=[
    {k:'overview',l:'Tổng quan',d:'M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z'},
    {k:'orders',l:'Đơn đặt hàng',d:'M3 7l9-4 9 4v10l-9 4-9-4z M3 7l9 4 9-4 M12 11v10'},
    {k:'tasks',l:'Công việc',d:'M9 11l3 3L22 4 M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11'},
    {k:'calendar',l:'Lịch & Deadline',d:'M3 5h18v16H3z M3 9h18 M8 3v4 M16 3v4'},
  ];
  const bdg={orders:orders.filter(o=>['cho_xn','da_xn'].includes(o.status)).length,tasks:tasks.filter(t=>!t.done).length};
  const tAlerts=tasks.filter(t=>!t.done&&t.due&&diff(t.due)<=3).sort((a,b)=>diff(a.due)-diff(b.due)).slice(0,3);
  const oAlerts=orders.filter(o=>o.ngayXuat&&!['da_giao','huy'].includes(o.status)&&diff(o.ngayXuat)<=7).sort((a,b)=>diff(a.ngayXuat)-diff(b.ngayXuat)).slice(0,3);
  const total=tAlerts.length+oAlerts.length;
  return(
    <aside style={{width:250,flexShrink:0,height:'100%',display:'flex',flexDirection:'column',background:'#fff',borderRight:'1px solid #ececec',padding:'20px 16px',overflowY:'auto'}}>
      {/* Brand */}
      <div style={{display:'flex',alignItems:'center',gap:11,padding:'6px 8px 22px'}}>
        <div style={{width:36,height:36,borderRadius:10,background:AC,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:17,flexShrink:0}}>{(brandName||'P')[0].toUpperCase()}</div>
        <div style={{minWidth:0}}>
          {eb?(
            <input value={tb} onChange={e=>setTb(e.target.value)} onBlur={()=>{setBrand(tb.trim()||'Panya');setEb(false);}} onKeyDown={e=>{if(e.key==='Enter'){setBrand(tb.trim()||'Panya');setEb(false);}}} autoFocus style={{fontSize:15,fontWeight:800,width:'100%',maxWidth:130,border:'1px solid '+AC,borderRadius:6,padding:'2px 6px',outline:'none',fontFamily:'inherit'}}/>
          ):(
            <div style={{display:'flex',alignItems:'center',gap:5}}>
              <span style={{fontSize:15,fontWeight:800,color:'#18181b'}}>{brandName}</span>
              <button onClick={()=>{setTb(brandName);setEb(true);}} style={{border:'none',background:'transparent',cursor:'pointer',color:'#a1a1aa',display:'inline-flex',padding:0,width:20,height:20,alignItems:'center'}}><Ic d={EditI} s={13}/></button>
            </div>
          )}
          <div style={{fontSize:11.5,color:'#71717a',marginTop:3,fontWeight:600}}>Bộ phận Thu Mua</div>
        </div>
      </div>
      {/* Nav */}
      <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.05em',color:'#a1a1aa',padding:'6px 10px',textTransform:'uppercase'}}>Menu</div>
      <nav style={{display:'flex',flexDirection:'column',gap:3,marginTop:4}}>
        {nav.map(item=>{
          const active=view===item.k;
          return(
            <div key={item.k} onClick={()=>setView(item.k)} style={{display:'flex',alignItems:'center',gap:11,padding:'10px 12px',borderRadius:9,fontSize:13.5,fontWeight:600,cursor:'pointer',background:active?AS:'transparent',color:active?AC:'#71717a',transition:'all .15s'}}>
              <Ic d={item.d} s={18} c="currentColor"/><span style={{flex:1}}>{item.l}</span>
              {bdg[item.k]?<span style={{background:AC,color:'#fff',fontSize:11,fontWeight:700,minWidth:20,height:20,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 6px'}}>{bdg[item.k]}</span>:null}
            </div>
          );
        })}
      </nav>
      {/* Alerts */}
      <div style={{marginTop:18,background:'#f7f7f7',border:'1px solid #ececec',borderRadius:12,padding:14}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#dc2626" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9 M13.7 21a2 2 0 0 1-3.4 0"/></svg>
          <span style={{fontSize:12.5,fontWeight:800,color:'#18181b'}}>Cần chú ý</span>
          <span style={{marginLeft:'auto',fontSize:11,fontWeight:800,minWidth:20,height:20,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 6px',color:total>0?'#dc2626':'#047857',background:total>0?'#fdecec':'#e3f6ec'}}>{total}</span>
        </div>
        {tAlerts.length>0&&<>
          <div style={{fontSize:10.5,fontWeight:800,letterSpacing:'0.05em',color:'#71717a',textTransform:'uppercase',margin:'12px 0 7px'}}>Công việc đến hạn</div>
          {tAlerts.map(t=>{const d=diff(t.due);const c=d<=0?'#dc2626':'#d97706';const lb=d<0?`Quá hạn ${Math.abs(d)} ngày`:d===0?'Hôm nay':`Còn ${d} ngày`;return(
            <div key={t.id} onClick={()=>setView('tasks')} style={{display:'flex',alignItems:'flex-start',gap:9,cursor:'pointer',marginBottom:8}}>
              <span style={{width:7,height:7,borderRadius:'50%',marginTop:5,flexShrink:0,background:c}}/>
              <div style={{minWidth:0,flex:1}}>
                <div style={{fontSize:12.5,fontWeight:700,color:'#18181b',lineHeight:1.3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</div>
                <div style={{fontSize:11,fontWeight:700,marginTop:2,color:c}}>{lb}</div>
              </div>
            </div>
          );})}
        </>}
        {oAlerts.length>0&&<>
          <div style={{fontSize:10.5,fontWeight:800,letterSpacing:'0.05em',color:'#71717a',textTransform:'uppercase',margin:'6px 0 7px'}}>Đơn sắp giao</div>
          {oAlerts.map(o=>{const d=diff(o.ngayXuat);const c=d<=0?'#dc2626':'#d97706';const lb=d<0?`Quá hạn ${Math.abs(d)} ngày`:d===0?'Giao hôm nay':`Giao trong ${d} ngày`;return(

    </aside>
  );
}

  const[openId,setOpenId]=useState(null);
  const[nid,setNid]=useState(100);
  const tabs=['all','cho_xn','da_xn','da_giao','huy'].map(k=>({k,l:k==='all'?'Tất cả':POM[k].label,c:k==='all'?orders.length:orders.filter(o=>o.status===k).length}));
  const filtered=orders.filter(o=>{
    if(filter!=='all'&&o.status!==filter)return false;
    if(search&&!(o.name+o.ncc+o.po+o.detail).toLowerCase().includes(search.toLowerCase()))return false;

          </button>

        <button onClick={newOrder} style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:7,height:36,padding:'0 16px',background:AC,color:'#fff',border:'none',borderRadius:10,fontSize:13.5,fontWeight:700,fontFamily:'inherit',cursor:'pointer'}}>

              <span onClick={()=>setOpenId(null)} style={{cursor:'pointer',color:'#a1a1aa',display:'flex',flexShrink:0}}><Ic d={CloseI} s={20}/></span>
            </div>
            <div style={{flex:1,padding:'20px 24px 28px'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                {FIELDS.map(f=>(
                  <label key={f.f} style={{display:'block',gridColumn:f.span?`1 / span ${f.span}`:'auto'}}>
                    <span style={{fontSize:11,fontWeight:700,color:'#a1a1aa',textTransform:'uppercase',letterSpacing:'0.04em'}}>{f.l}</span>
                    {f.type==='select'?(
                      <select value={openObj.status} onChange={e=>upd(openObj.id,{status:e.target.value})} style={{width:'100%',height:40,marginTop:6,border:'1px solid #ececec',borderRadius:10,padding:'0 10px',fontSize:14,fontWeight:700,fontFamily:'inherit',outline:'none',background:'#fff',color:'#18181b',cursor:'pointer'}}>
                        {SL.map(k=><option key={k} value={k}>{POM[k].label}</option>)}
                      </select>
                    ):(
                      <input type={f.type||'text'} value={openObj[f.f]||''} onChange={e=>upd(openObj.id,{[f.f]:e.target.value})} placeholder={f.ph||''} style={{width:'100%',height:40,marginTop:6,border:'1px solid #ececec',borderRadius:10,padding:'0 12px',fontSize:14,fontWeight:600,fontFamily:'inherit',outline:'none',color:'#18181b'}}/>
                    )}
                  </label>
                ))}
                <label style={{display:'block',gridColumn:'1 / span 2'}}>
                  <span style={{fontSize:11,fontWeight:700,color:'#a1a1aa',textTransform:'uppercase',letterSpacing:'0.04em'}}>Ghi chú</span>
                  <textarea value={openObj.note||''} onChange={e=>upd(openObj.id,{note:e.target.value})} placeholder="Điều khoản, thanh toán, lưu ý…" style={{width:'100%',minHeight:74,resize:'vertical',marginTop:6,border:'1px solid #ececec',borderRadius:10,padding:'10px 12px',fontSize:13.5,fontWeight:500,lineHeight:1.5,fontFamily:'inherit',outline:'none',color:'#27272a'}}/>
                </label>
              </div>
              <div style={{marginTop:22,paddingTop:14,borderTop:'1px solid #ececec'}}>
                <button onClick={()=>del([openObj.id])} style={{height:36,padding:'0 16px',background:'#fdecec',color:'#dc2626',border:'none',borderRadius:9,fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>🗑️ Xóa đơn này</button>
              </div>
            </div>
          </div>
        </div>
      )}
      {menuId&&<div onClick={()=>setMenuId(null)} style={{position:'fixed',inset:0,zIndex:35}}/>}
    </div>
  );
}

/* ========== TASKS ========== */
function Tasks({tasks,setTasks}){
  const[filter,setFilter]=useState('all');
  const[dateF,setDateF]=useState('');
  const[newT,setNewT]=useState('');
  const[selIds,setSelIds]=useState([]);
  const[editId,setEditId]=useState(null);
  const[editV,setEditV]=useState('');
  const[editDateId,setEditDateId]=useState(null);
  const[menuId,setMenuId]=useState(null);
  const[dlPrompt,setDlPrompt]=useState(null);
  const[tmpDL,setTmpDL]=useState('');
  const[nid,setNid]=useState(200);
  const rows=tasks.map(t=>({...t,st:tSt(t)}));
  const filtered=rows.filter(t=>{
    if(filter!=='all'&&t.st!==filter)return false;
    if(dateF&&t.due!==dateF)return false;
    return true;
  });
  const tabs=[
    {k:'all',l:'Tất cả',c:rows.length},
    {k:'pending',l:'Cần làm',c:rows.filter(t=>t.st==='pending').length},
    {k:'overdue',l:'Quá hạn',c:rows.filter(t=>t.st==='overdue').length},
    {k:'done',l:'Hoàn thành',c:rows.filter(t=>t.st==='done').length},
  ];
  const addTask=()=>{
    const v=newT.trim();if(!v)return;
    const id=nid;setNid(n=>n+1);
    setTasks(ts=>[{id,title:v,done:false,due:null,ncc:''},...ts]);
    setNewT('');setDlPrompt({id,title:v});setTmpDL('');
  };
  const upd=(id,p)=>setTasks(ts=>ts.map(t=>t.id===id?{...t,...p}:t));
  const del=ids=>{setTasks(ts=>ts.filter(t=>!ids.includes(t.id)));setSelIds([]);};
  const overdues=rows.filter(t=>t.st==='overdue');
  const stats=[
    {l:'Cần làm',v:rows.filter(t=>t.st==='pending').length,c:'#2563eb',k:'pending'},
    {l:'Quá hạn',v:overdues.length,c:'#dc2626',k:'overdue'},
    {l:'Hoàn thành',v:rows.filter(t=>t.st==='done').length,c:'#16a34a',k:'done'},
  ];
  return(
    <div style={{display:'grid',gridTemplateColumns:'1fr 290px',gap:18,alignItems:'start'}}>
      <div>
        <div style={{display:'flex',gap:10,marginBottom:14}}>
          <input value={newT} onChange={e=>setNewT(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addTask();}} placeholder="Thêm công việc mới rồi nhấn Enter…" style={{flex:1,height:44,border:'1px solid #ececec',borderRadius:11,padding:'0 16px',fontSize:14,fontFamily:'inherit',outline:'none',background:'#fff',color:'#18181b'}}/>
          <button onClick={addTask} style={{height:44,padding:'0 18px',background:AC,color:'#fff',border:'none',borderRadius:11,fontSize:14,fontWeight:700,fontFamily:'inherit',cursor:'pointer'}}>Thêm việc</button>
        </div>
        <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
          {tabs.map(t=>(
            <button key={t.k} onClick={()=>setFilter(t.k)} style={{display:'inline-flex',alignItems:'center',gap:8,height:36,padding:'0 14px',borderRadius:9,fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit',border:'1px solid',borderColor:filter===t.k?AC:'#ececec',background:filter===t.k?AC:'#fff',color:filter===t.k?'#fff':'#52525b'}}>
              {t.l}<span style={{fontSize:11.5,fontWeight:800,minWidth:20,height:18,borderRadius:9,display:'inline-flex',alignItems:'center',justifyContent:'center',padding:'0 6px',background:filter===t.k?'rgba(255,255,255,.25)':'#f1f1f2',color:filter===t.k?'#fff':'#71717a'}}>{t.c}</span>
            </button>
          ))}
          <label style={{display:'flex',alignItems:'center',gap:7,marginLeft:'auto',background:'#fff',border:'1px solid #ececec',borderRadius:9,padding:'0 11px',height:36,fontSize:12,fontWeight:700,color:'#71717a'}}>
            Lọc ngày <input type="date" value={dateF} onChange={e=>setDateF(e.target.value)} style={{border:'none',outline:'none',background:'transparent',fontSize:13,fontFamily:'inherit',color:'#18181b'}}/>
          </label>
          {dateF&&<button onClick={()=>setDateF('')} style={{height:36,padding:'0 12px',background:'transparent',border:'1px solid #ececec',borderRadius:9,fontSize:12,fontWeight:700,color:'#71717a',cursor:'pointer',fontFamily:'inherit'}}>Xóa</button>}
        </div>
        <div style={{background:'#fff',border:'1px solid #ececec',borderRadius:14,overflow:'visible'}}>
          {filtered.map(t=>{
            const m=TKM[t.st];
            const sel=selIds.includes(t.id);
            const d=diff(t.due);
            const dlC=t.st==='overdue'?'#dc2626':t.st==='done'?'#a1a1aa':d===0?'#b45309':'#52525b';
            return(
              <div key={t.id} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 18px',borderBottom:'1px solid #f2f2f2',background:t.st==='overdue'?'#fdecec':sel?'rgba(214,86,0,0.04)':'transparent'}}>
                <span onClick={()=>setSelIds(s=>s.includes(t.id)?s.filter(x=>x!==t.id):[...s,t.id])} style={{width:20,height:20,borderRadius:6,border:'2px solid',borderColor:sel?AC:'#cfcfd4',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',background:sel?AC:'#fff',flexShrink:0}}>
                  {sel&&<Ic d={CheckI} s={12} c="#fff" sw={3.2}/>}
                </span>
                <div style={{flex:1,minWidth:0}}>
                  {editId===t.id?(
                    <input value={editV} onChange={e=>setEditV(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){upd(t.id,{title:editV.trim()||t.title});setEditId(null);}else if(e.key==='Escape')setEditId(null);}} onBlur={()=>{upd(t.id,{title:editV.trim()||t.title});setEditId(null);}} autoFocus style={{width:'100%',fontSize:14,fontWeight:600,color:'#18181b',border:'1px solid '+AC,borderRadius:7,padding:'5px 9px',fontFamily:'inherit',outline:'none'}}/>
                  ):(
                    <div onClick={()=>{setEditId(t.id);setEditV(t.title);}} style={{fontSize:14,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#27272a',cursor:'text',textDecoration:t.done?'line-through':'none',opacity:t.done?.6:1}}>{t.title}</div>
                  )}
                  {t.ncc&&<div style={{fontSize:12,color:'#a1a1aa',fontWeight:600,marginTop:2}}>NCC: {t.ncc}</div>}
                </div>
                <div style={{position:'relative',flexShrink:0}}>
                  <span onClick={()=>setMenuId(menuId===t.id?null:t.id)} style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:11.5,fontWeight:700,color:m.fg,background:m.bg,padding:'5px 9px',borderRadius:20,cursor:'pointer'}}>
                    {m.label}<Ic d={ChevD} s={11}/>
                  </span>
                  {menuId===t.id&&(
                    <div style={{position:'absolute',top:'calc(100% + 4px)',right:0,zIndex:40,background:'#fff',border:'1px solid #ececec',borderRadius:11,boxShadow:'0 10px 28px rgba(0,0,0,.14)',padding:5,minWidth:140}}>
                      {[{v:false,l:'Cần làm',d:'#2563eb'},{v:true,l:'Hoàn thành',d:'#16a34a'}].map(opt=>(
                        <div key={String(opt.v)} onClick={()=>{upd(t.id,{done:opt.v});setMenuId(null);}} style={{display:'flex',alignItems:'center',gap:9,padding:'8px 10px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',color:'#3f3f46',background:t.done===opt.v?'#f4f4f5':'transparent'}}>
                          <span style={{width:8,height:8,borderRadius:'50%',background:opt.d,flexShrink:0}}/>{opt.l}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <div style={{width:96,flexShrink:0,display:'flex',justifyContent:'flex-end'}}>
                  {editDateId===t.id?(
                    <input type="date" value={t.due||''} onChange={e=>{upd(t.id,{due:e.target.value||null});setEditDateId(null);}} onBlur={()=>setEditDateId(null)} autoFocus style={{fontSize:12,fontFamily:'inherit',border:'1px solid '+AC,borderRadius:7,padding:'3px 6px',outline:'none',color:'#18181b',width:96}}/>
                  ):(
                    <span onClick={()=>setEditDateId(t.id)} style={{fontSize:12.5,color:dlC,fontWeight:700,textAlign:'right',cursor:'pointer'}}>{t.due?fmtDM(t.due):'+ Thêm hạn'}</span>
                  )}
                </div>
              </div>
            );
          })}
          {filtered.length===0&&<div style={{padding:48,textAlign:'center',color:'#a1a1aa',fontSize:14,fontWeight:600}}>Không có công việc nào.</div>}
        </div>
        {selIds.length>0&&(
          <div style={{marginTop:12,display:'flex',gap:8}}>
            <button onClick={()=>{setTasks(ts=>ts.map(t=>selIds.includes(t.id)?{...t,done:true}:t));setSelIds([]);}} style={{height:36,padding:'0 14px',background:'#e3f6ec',color:'#047857',border:'none',borderRadius:9,fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>✅ Hoàn thành ({selIds.length})</button>
            <button onClick={()=>del(selIds)} style={{height:36,padding:'0 14px',background:'#fdecec',color:'#dc2626',border:'none',borderRadius:9,fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>🗑️ Xóa ({selIds.length})</button>
            <button onClick={()=>setSelIds([])} style={{height:36,padding:'0 14px',background:'#f4f4f5',color:'#52525b',border:'none',borderRadius:9,fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>Bỏ chọn</button>
          </div>
        )}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <div style={{background:'#fff',border:'1px solid #ececec',borderRadius:14,padding:'16px 18px'}}>
          <div style={{fontSize:14,fontWeight:800,marginBottom:6}}>Tổng quan công việc</div>
          {stats.map(s=>(
            <div key={s.k} onClick={()=>setFilter(s.k)} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 0',cursor:'pointer',borderTop:'1px solid #f5f5f4'}}>
              <span style={{width:10,height:10,borderRadius:'50%',flexShrink:0,background:s.c}}/><span style={{flex:1,fontSize:13,fontWeight:600,color:'#3f3f46'}}>{s.l}</span><span style={{fontSize:16,fontWeight:800,color:s.c}}>{s.v}</span>
            </div>
          ))}
        </div>
        {overdues.length>0&&(
          <div style={{background:'#fff',border:'1px solid #ececec',borderRadius:14,overflow:'hidden'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,fontSize:14,fontWeight:800,padding:'16px 18px 6px',color:'#b91c1c'}}>
              <span style={{width:9,height:9,borderRadius:'50%',background:'#dc2626'}}/>Việc quá hạn
            </div>
            {overdues.map(t=>(
              <div key={t.id} onClick={()=>setFilter('overdue')} style={{padding:'11px 18px',borderTop:'1px solid #f5f5f4',cursor:'pointer'}}>
                <div style={{fontSize:13,fontWeight:700,color:'#27272a',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</div>
                <div style={{fontSize:11.5,fontWeight:700,color:'#dc2626',marginTop:2}}>Hạn {fmtDM(t.due)} · Trễ {Math.abs(diff(t.due))} ngày</div>
              </div>
            ))}
          </div>
        )}
      </div>
      {/* Deadline prompt */}
      {dlPrompt&&(
        <div style={{position:'fixed',inset:0,zIndex:70,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div onClick={()=>setDlPrompt(null)} style={{position:'absolute',inset:0,background:'rgba(24,24,27,.34)'}}/>
          <div style={{position:'relative',width:380,maxWidth:'92vw',background:'#fff',borderRadius:16,boxShadow:'0 24px 60px rgba(0,0,0,.24)',padding:24}}>
            <div style={{fontSize:16,fontWeight:800}}>Chọn deadline cho việc</div>
            <div style={{fontSize:13,color:'#71717a',fontWeight:600,marginTop:5,lineHeight:1.45}}>"{dlPrompt.title}"</div>
            <input type="date" value={tmpDL} onChange={e=>setTmpDL(e.target.value)} style={{width:'100%',height:46,border:'1px solid #ececec',borderRadius:11,padding:'0 14px',fontSize:14,fontFamily:'inherit',outline:'none',marginTop:16,color:'#18181b'}}/>
            <div style={{display:'flex',gap:10,marginTop:18}}>
              <button onClick={()=>setDlPrompt(null)} style={{flex:1,height:44,background:'#f4f4f5',color:'#52525b',border:'none',borderRadius:11,fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>Bỏ qua</button>
              <button onClick={()=>{if(tmpDL)upd(dlPrompt.id,{due:tmpDL});setDlPrompt(null);}} style={{flex:1,height:44,background:AC,color:'#fff',border:'none',borderRadius:11,fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>Lưu deadline</button>
            </div>
          </div>
        </div>
      )}
      {menuId&&<div onClick={()=>setMenuId(null)} style={{position:'fixed',inset:0,zIndex:35}}/>}
    </div>
  );
}

/* ========== CALENDAR ========== */
function Calendar({orders,tasks}){
  const[vy,setVy]=useState(2026);
  const[vm,setVm]=useState(5);
  const[selDate,setSelDate]=useState(TODAY);
  const[pickerOpen,setPickerOpen]=useState(false);
  const[pickerY,setPickerY]=useState(2026);
  const fd=new Date(vy,vm,1).getDay();
  const off=(fd+6)%7;
  const dim=new Date(vy,vm+1,0).getDate();
  // Build buckets
  const bk={};
  const ab=(d,item)=>{bk[d]=bk[d]||[];bk[d].push(item);};
  orders.forEach(o=>{
    if(!o.ngayXuat)return;
    const[y,m,d]=o.ngayXuat.split('-').map(Number);
    if(y===vy&&m-1===vm&&!['da_giao','huy'].includes(o.status))ab(d,{k:'po',t:o.name,ov:isOD(o.ngayXuat)});
  });
  tasks.forEach(t=>{
    if(!t.due||t.done)return;
    const[y,m,d]=t.due.split('-').map(Number);
    if(y===vy&&m-1===vm)ab(d,{k:'task',t:t.title,ov:isOD(t.due)});
  });
  // Selected day events
  const sYM=selDate.slice(0,7);
  const cYM=vy+'-'+pad(vm+1);
  const selEvs=[];
  if(sYM===cYM){
    orders.filter(o=>o.ngayXuat===selDate&&!['da_giao','huy'].includes(o.status)).forEach(o=>selEvs.push({k:'po',t:o.name,sub:'NCC '+o.ncc}));
    tasks.filter(t=>t.due===selDate&&!t.done).forEach(t=>selEvs.push({k:'task',t:t.title,sub:t.ncc?'NCC '+t.ncc:'Nội bộ'}));
  }
  const prevM=()=>{let m=vm-1,y=vy;if(m<0){m=11;y--;}setVm(m);setVy(y);};
  const nextM=()=>{let m=vm+1,y=vy;if(m>11){m=0;y++;}setVm(m);setVy(y);};
  return(
    <div style={{display:'grid',gridTemplateColumns:'2.4fr 1fr',gap:16,alignItems:'start'}}>
      <div style={{background:'#fff',border:'1px solid #ececec',borderRadius:14,padding:'22px 24px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
          <div style={{background:AS,borderRadius:12,padding:'9px 15px'}}>
            <div style={{fontSize:11,fontWeight:800,color:AC,textTransform:'uppercase',letterSpacing:'0.05em'}}>Hôm nay</div>
            <div style={{fontSize:16,fontWeight:800,color:AC,marginTop:2}}>{fmtFull(TODAY)}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,position:'relative'}}>
            <span onClick={prevM} style={{width:34,height:34,borderRadius:9,border:'1px solid #ececec',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#52525b'}}><Ic d={ChevL} s={16}/></span>
            <span onClick={()=>setPickerOpen(!pickerOpen)} style={{fontSize:16,fontWeight:800,cursor:'pointer',padding:'6px 12px',borderRadius:9,minWidth:150,textAlign:'center'}}>{MTHS[vm]} {vy}</span>
            <span onClick={nextM} style={{width:34,height:34,borderRadius:9,border:'1px solid #ececec',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#52525b'}}><Ic d={ChevR} s={16}/></span>
            {pickerOpen&&(
              <div style={{position:'absolute',top:'calc(100% + 8px)',right:0,zIndex:40,background:'#fff',border:'1px solid #ececec',borderRadius:14,boxShadow:'0 14px 36px rgba(0,0,0,.16)',padding:14,width:290}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                  <span onClick={()=>setPickerY(y=>y-1)} style={{width:30,height:30,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#52525b'}}><Ic d={ChevL} s={15}/></span>
                  <span style={{fontSize:16,fontWeight:800}}>{pickerY}</span>
                  <span onClick={()=>setPickerY(y=>y+1)} style={{width:30,height:30,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#52525b'}}><Ic d={ChevR} s={15}/></span>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:7}}>
                  {MTHS.map((n,idx)=>{const active=idx===vm&&pickerY===vy;return<div key={idx} onClick={()=>{setVm(idx);setVy(pickerY);setPickerOpen(false);}} style={{textAlign:'center',padding:'9px 0',borderRadius:9,fontSize:13,fontWeight:700,cursor:'pointer',background:active?AC:'#f7f7f6',color:active?'#fff':'#3f3f46'}}>{n.replace('Tháng ','Th ')}</div>;})}
                </div>
              </div>
            )}
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:7,marginBottom:8}}>
          {WDS.map(w=><div key={w} style={{textAlign:'center',fontSize:11.5,fontWeight:700,color:'#a1a1aa',textTransform:'uppercase'}}>{w}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:7}}>
          {Array.from({length:off}).map((_,i)=><div key={'e'+i}/>)}
          {Array.from({length:dim}).map((_,i)=>{
            const d=i+1;
            const iso=vy+'-'+pad(vm+1)+'-'+pad(d);
            const isT=iso===TODAY;const isSel=iso===selDate;
            const evs=bk[d]||[];
            const oN=evs.filter(e=>e.k==='po'&&!e.ov).length;
            const tN=evs.filter(e=>e.k==='task'&&!e.ov).length;
            const ovN=evs.filter(e=>e.ov).length;
            let bg='#fafafa',bc='transparent',dc='#52525b';
            if(isSel){bg=AS;bc=AC;dc=AC;}else if(isT){bg='rgba(214,86,0,0.06)';dc=AC;}
            return(
              <div key={d} onClick={()=>setSelDate(iso)} style={{minHeight:84,display:'flex',flexDirection:'column',gap:2,padding:'7px 7px 6px',borderRadius:10,cursor:'pointer',border:'1px solid',borderColor:bc,background:bg,overflow:'hidden',transition:'all .12s'}}>
                <span style={{fontSize:13,fontWeight:700,color:dc}}>{d}</span>
                {evs.length>0&&<div style={{fontSize:11,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:ovN?'#dc2626':oN?'#2563eb':'#16a34a',marginTop:2}}>{evs[0].t}</div>}
                {evs.length>0&&(
                  <div style={{display:'flex',alignItems:'center',gap:6,marginTop:'auto',paddingTop:3}}>
                    {ovN>0&&<span style={{fontSize:11,fontWeight:800,color:'#dc2626',display:'inline-flex',alignItems:'center',gap:3}}><span style={{width:7,height:7,borderRadius:'50%',background:'#dc2626'}}/>{ovN}</span>}
                    {oN>0&&<span style={{fontSize:11,fontWeight:800,color:'#2563eb',display:'inline-flex',alignItems:'center',gap:3}}><span style={{width:7,height:7,borderRadius:'50%',background:'#2563eb'}}/>{oN}</span>}
                    {tN>0&&<span style={{fontSize:11,fontWeight:800,color:'#16a34a',display:'inline-flex',alignItems:'center',gap:3}}><span style={{width:7,height:7,borderRadius:'50%',background:'#16a34a'}}/>{tN}</span>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:16,marginTop:18,paddingTop:14,borderTop:'1px solid #f2f2f2'}}>
          {[['#2563eb','Đơn đặt hàng'],['#16a34a','Công việc'],['#dc2626','Quá hạn']].map(([c,l])=>(
            <span key={c} style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:11.5,fontWeight:700,color:'#71717a'}}><span style={{width:9,height:9,borderRadius:3,background:c,flexShrink:0}}/>{l}</span>
          ))}
        </div>
      </div>
      <div style={{background:'#fff',border:'1px solid #ececec',borderRadius:14,overflow:'hidden'}}>
        <div style={{padding:'16px 16px 6px'}}>
          <div style={{fontSize:14,fontWeight:800}}>{fmtFull(selDate)}</div>
          <div style={{fontSize:12,color:'#a1a1aa',fontWeight:600,marginTop:3}}>{selEvs.length?`${selEvs.length} mục đến hạn`:'Không có deadline'}</div>
        </div>
        {selEvs.map((e,i)=>(
          <div key={i} style={{display:'flex',alignItems:'flex-start',gap:11,padding:'12px 16px',borderTop:'1px solid #f2f2f2'}}>
            <span style={{width:34,height:34,borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,background:e.k==='po'?'#e8f0fe':'#e3f6ec',color:e.k==='po'?'#1d4ed8':'#16a34a'}}>
              <Ic d={e.k==='po'?'M3 7l9-4 9 4v10l-9 4-9-4z M3 7l9 4 9-4 M12 11v10':'M9 11l3 3L22 4 M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11'} s={16}/>
            </span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:700,lineHeight:1.35}}>{e.t}</div>
              <div style={{fontSize:11.5,color:'#a1a1aa',fontWeight:600,marginTop:3}}>{e.sub}</div>
            </div>
          </div>
        ))}
        {selEvs.length===0&&<div style={{padding:'34px 16px',textAlign:'center',color:'#c4c4c8',fontSize:13,fontWeight:600,borderTop:'1px solid #f2f2f2'}}>Không có deadline nào trong ngày này.</div>}
      </div>
      {pickerOpen&&<div onClick={()=>setPickerOpen(false)} style={{position:'fixed',inset:0,zIndex:35}}/>}
    </div>
  );
}

/* ========== HEADER ========== */
function Header({view,orders,tasks}){
  const meta={
    overview:{t:'Tổng quan',s:'Bảng điều hành Thu Mua · Panya Home',d:'M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z',bg:'#ffe6cf',fg:'#c2410c',pill:'Hôm nay'},
    orders:{t:'Đơn đặt hàng',s:'Theo dõi tiến độ đặt & giao hàng từ NCC',d:'M3 7l9-4 9 4v10l-9 4-9-4z M3 7l9 4 9-4 M12 11v10',bg:'#dbeafe',fg:'#1d4ed8',pill:orders.filter(o=>['cho_xn','da_xn'].includes(o.status)).length+' đang theo dõi'},
    tasks:{t:'Công việc & Deadline',s:'Việc cần xử lý của bộ phận Thu Mua',d:'M9 11l3 3L22 4 M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11',bg:'#dcfce7',fg:'#15803d',pill:tasks.filter(t=>!t.done).length+' cần làm'},
    calendar:{t:'Lịch & Deadline',s:'Deadline đơn hàng và công việc trong tháng',d:'M3 5h18v16H3z M3 9h18 M8 3v4 M16 3v4',bg:'#f4e7c9',fg:'#a16207',pill:'Tháng 6'},
  };
  const m=meta[view]||meta.overview;
  return(
    <header style={{flexShrink:0,height:82,borderBottom:'1px solid #e0d5cc',background:'transparent',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 32px',gap:20}}>
      <div style={{display:'flex',alignItems:'center',gap:15,minWidth:0}}>
        <span style={{width:48,height:48,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,background:m.bg,color:m.fg,boxShadow:'0 4px 14px rgba(0,0,0,.08)'}}>
          <Ic d={m.d} s={24}/>
        </span>
        <div style={{minWidth:0}}>
          <h1 style={{margin:0,fontSize:22,fontWeight:800,letterSpacing:'-.02em',display:'flex',alignItems:'center',gap:10}}>
            {m.t}<span style={{fontSize:11,fontWeight:800,letterSpacing:'0.03em',textTransform:'uppercase',color:m.fg,background:m.bg,padding:'3px 9px',borderRadius:20}}>{m.pill}</span>
          </h1>
          <p style={{margin:'3px 0 0',fontSize:13,color:'#71717a',fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{m.s}</p>
        </div>
      </div>
    </header>
  );
}

/* ========== APP ========== */
const VBGS={overview:'#fce4cf',orders:'#dde8f1',tasks:'#e2ecd9',calendar:'#ede5d4'};
function App(){
  const[view,setView]=useState('overview');
  const[orders,setOrders]=useState(INIT_ORDERS);
  const[tasks,setTasks]=useState(INIT_TASKS);
  const[notes,setNotes]=useState('');
  const[brand,setBrand]=useState('Panya');
  const[user,setUser]=useState('Andrew');
  const[wCity,setWCity]=useState('hcm');

  useEffect(()=>{
    try{const s=localStorage.getItem('panya_dash_v3');if(s){const d=JSON.parse(s);if(d.orders)setOrders(d.orders);if(d.tasks)setTasks(d.tasks);if(d.notes)setNotes(d.notes);if(d.brand)setBrand(d.brand);if(d.user)setUser(d.user);if(d.wCity)setWCity(d.wCity);}}catch(e){}
  },[]);

  useEffect(()=>{
    const t=setTimeout(()=>{try{localStorage.setItem('panya_dash_v3',JSON.stringify({orders,tasks,notes,brand,user,wCity}));}catch(e){}},300);
    return()=>clearTimeout(t);
  },[orders,tasks,notes,brand,user,wCity]);

  return(
    <div style={{display:'flex',height:'100vh',width:'100%',fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",background:VBGS[view]||'#f6f6f5',color:'#18181b',WebkitFontSmoothing:'antialiased'}}>
      <Sidebar view={view} setView={setView} orders={orders} tasks={tasks} brandName={brand} setBrand={setBrand} userName={user} setUser={setUser}/>
      <main style={{flex:1,height:'100%',display:'flex',flexDirection:'column',minWidth:0}}>
        <Header view={view} orders={orders} tasks={tasks}/>
        <div style={{flex:1,overflowY:'auto',padding:'28px 32px 44px'}}>
          {view==='overview'&&<Overview orders={orders} tasks={tasks} notes={notes} setNotes={setNotes} setView={setView} weatherCity={wCity} setWeatherCity={setWCity}/>}
          {view==='orders'&&<Orders orders={orders} setOrders={setOrders}/>}
          {view==='tasks'&&<Tasks tasks={tasks} setTasks={setTasks}/>}
          {view==='calendar'&&<Calendar orders={orders} tasks={tasks}/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
