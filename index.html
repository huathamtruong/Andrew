.navbadge{background:var(--ac);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 6px;margin-left:auto}

.alert-item{display:flex;align-items:flex-start;gap:9px;cursor:pointer;margin-bottom:8px}
.alert-dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0}

.main{flex:1;height:100%;display:flex;flex-direction:column;min-width:0}
.hd{flex-shrink:0;height:82px;border-bottom:1px solid #e0d5cc;display:flex;align-items:center;justify-content:space-between;padding:0 32px;gap:20px}
.hd-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.content{flex:1;overflow-y:auto;padding:28px 32px 44px}
.pill{font-size:11px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.card{background:#fff;border:1px solid #ececec;border-radius:14px}
.badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap}
.kpi{background:#fff;border:1px solid #ececec;border-radius:13px;padding:13px 15px;display:flex;align-items:center;gap:12px}
.kpi-ic{width:38px;height:38px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.tab{display:inline-flex;align-items:center;gap:8px;height:36px;padding:0 14px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #ececec;background:#fff;color:#52525b}
.tab.active{border-color:var(--ac);background:var(--ac);color:#fff}
.tab-count{font-size:11.5px;font-weight:800;min-width:20px;height:18px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 6px;background:#f1f1f2;color:#71717a}
.tab.active .tab-count{background:rgba(255,255,255,.25);color:#fff}
.btn-primary{height:36px;padding:0 16px;background:var(--ac);color:#fff;border:none;border-radius:10px;font-size:13.5px;font-weight:700;display:inline-flex;align-items:center;gap:7px}
.inp{height:36px;border:1px solid #ececec;border-radius:9px;padding:0 12px;font-size:13px;outline:none;background:#f7f7f6}
.cbox{width:20px;height:20px;border-radius:6px;border:2px solid #cfcfd4;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;flex-shrink:0}
.cbox.on{background:var(--ac);border-color:var(--ac)}
.drawer-field{font-size:11px;font-weight:700;color:#a1a1aa;text-transform:uppercase;letter-spacing:.04em}
.drawer-inp{width:100%;height:40px;margin-top:6px;border:1px solid #ececec;border-radius:10px;padding:0 12px;font-size:14px;font-weight:600;outline:none;color:#18181b}
.statusmenu{position:absolute;z-index:40;background:#fff;border:1px solid #ececec;border-radius:11px;box-shadow:0 10px 28px rgba(0,0,0,.14);padding:5px;min-width:140px}
.statusmenu-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#3f3f46}
.hidden{display:none!important}
svg{flex-shrink:0}

/* ID của workspace dùng CHUNG cho cả team Thu Mua. Mọi người đăng nhập đều thấy

var WORKSPACE_ID='panya-thumua';

var FB={ready:false,configured:false,auth:null,db:null,storage:null,user:null,status:'init',unsub:null,timer:null,lastJSON:'',firstSnap:true};
var SYNC_OPEN=false;
var LOGIN={email:'',err:''};

function fbConfigured(){return firebaseConfig.apiKey&&firebaseConfig.apiKey.indexOf('DAN_')!==0;}
function syncData(){return {orders:S.orders,tasks:S.tasks,notes:S.notes,brand:S.brand,wCity:S.wCity,calImportant:S.calImportant||[],ncc:S.ncc||[],quotes:S.quotes||[],members:S.members||{},nid:S.nid};}
function applyData(d){if(!d)return;S.orders=d.orders||S.orders;S.tasks=d.tasks||S.tasks;S.notes=d.notes||'';S.brand=d.brand||'Panya';S.wCity=d.wCity||'hcm';S.calImportant=d.calImportant||[];S.ncc=d.ncc||[];S.quotes=d.quotes||[];S.members=d.members||{};if(d.nid)S.nid=Math.max(S.nid,d.nid);computeRole();}
/* ===== Phân quyền ===== */
function computeRole(){var u=FB.user;if(u&&S.members&&S.members[u.uid]){S.role=S.members[u.uid].role||'member';}else{S.role='member';}}
function isAdmin(){return S.role==='admin';}
function memberCount(){return Object.keys(S.members||{}).length;}

function fbInit(){
  if(typeof firebase==='undefined'){FB.status='nolib';return;}
  if(!fbConfigured()){FB.status='unconfigured';return;}
  try{
    firebase.initializeApp(firebaseConfig);
    FB.auth=firebase.auth();FB.db=firebase.firestore();FB.configured=true;
    try{FB.storage=firebase.storage();}catch(e){FB.storage=null;}
    FB.auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    FB.status='loggedout';
    FB.auth.onAuthStateChanged(function(user){
      FB.user=user;
      if(user){FB.status='ok';SYNC_OPEN=false;subscribeCloud();}
      else{FB.status='loggedout';if(FB.unsub){FB.unsub();FB.unsub=null;}}
      render();
    });
  }catch(e){FB.status='error';}
}

/* Doc dùng CHUNG cho cả team. (Trước đây mỗi người 1 doc theo uid → giờ chung 1 workspace) */
function docRef(){return FB.db.collection('workspaces').doc(WORKSPACE_ID);}
/* Doc cũ theo từng người — dùng để di trú dữ liệu lần đầu */
function legacyRef(){return FB.db.collection('dashboards').doc(FB.user.uid);}

function ensureMembership(){
  var u=FB.user;if(!u)return false;
  if(!S.members)S.members={};
  if(!S.members[u.uid]){
    var first=memberCount()===0;
    S.members[u.uid]={email:u.email||'',name:S.user||(u.email||'').split('@')[0]||'Thành viên',role:first?'admin':'member',joinedAt:Date.now()};
    computeRole();
    return true;
  }
  if(S.user&&S.members[u.uid].name!==S.user){S.members[u.uid].name=S.user;computeRole();return true;}
  computeRole();
  return false;
}

function subscribeCloud(){
  if(FB.unsub)FB.unsub();
  FB.firstSnap=true;
  FB.unsub=docRef().onSnapshot(function(snap){
    if(snap.metadata.hasPendingWrites)return;
    if(!snap.exists){migrateLegacyThenCreate();return;}
    var d=snap.data();
    applyData(d);
    var changed=ensureMembership();
    save_local();FB.lastJSON=JSON.stringify(d);FB.firstSnap=false;
    if(changed)cloudPush();
    var ae=document.activeElement,tag=ae?ae.tagName:'';
    if(tag!=='INPUT'&&tag!=='TEXTAREA'&&tag!=='SELECT')render(); else updateSyncBadge();
  },function(){FB.status='error';updateSyncBadge();});
}

function migrateLegacyThenCreate(){
  ensureMembership();
  legacyRef().get().then(function(ls){
    if(ls&&ls.exists){var od=ls.data();
      if(od.orders&&od.orders.length)S.orders=od.orders;
      if(od.tasks&&od.tasks.length)S.tasks=od.tasks;
      if(od.notes)S.notes=od.notes;
      if(od.ncc)S.ncc=od.ncc;if(od.quotes)S.quotes=od.quotes;
      if(od.calImportant)S.calImportant=od.calImportant;
    }
  }).catch(function(){}).then(function(){cloudPush();render();});
}

function cloudPush(){
  if(!FB.user)return;
  setSyncStatus('syncing');
  var data=syncData();FB.lastJSON=JSON.stringify(data);
  docRef().set(data).then(function(){setSyncStatus('ok');})
   .catch(function(){setSyncStatus('error');});
}
function cloudPushDebounced(){if(!FB.user)return;if(FB.timer)clearTimeout(FB.timer);FB.timer=setTimeout(cloudPush,700);}

function syncInfo(){
  switch(FB.status){
    case 'nolib':return{c:'#dc2626',t:'Lỗi tải Firebase'};
    case 'unconfigured':return{c:'#a1a1aa',t:'Chưa cấu hình Firebase'};
    case 'error':return{c:'#dc2626',t:'Lỗi — bấm để sửa'};
    case 'loggedout':return{c:'#2563eb',t:'Đăng nhập để đồng bộ'};
    case 'syncing':return{c:'#b45309',t:'Đang lưu…'};
    case 'ok':return{c:'#047857',t:'Online · Đã lưu ✓'};
    default:return{c:'#a1a1aa',t:'Đồng bộ đám mây'};
  }
}
function updateSyncBadge(){var i=syncInfo();var d=el('sync-dot'),l=el('sync-label');if(d)d.style.background=i.c;if(l){l.textContent=i.t;l.style.color=FB.user?i.c:'#71717a';}}
function setSyncStatus(st){FB.status=st;updateSyncBadge();}

function renderCalendar(){
  var vy=S.calY,vm=S.calM;
  var fd=new Date(vy,vm,1).getDay();var off=(fd+6)%7;
  var dim=new Date(vy,vm+1,0).getDate();
  var bk={};
  function ab(d,item){if(!bk[d])bk[d]=[];bk[d].push(item);}
  S.orders.forEach(function(o){if(!o.ngayXuat)return;var p=o.ngayXuat.split('-').map(Number);if(p[0]===vy&&p[1]-1===vm&&o.status!=='da_giao'&&o.status!=='huy')ab(p[2],{k:'po',t:o.name,ov:isOD(o.ngayXuat)});});
  S.tasks.forEach(function(t){if(!t.due||t.done)return;var p=t.due.split('-').map(Number);if(p[0]===vy&&p[1]-1===vm)ab(p[2],{k:'task',t:t.title,ov:isOD(t.due)});});

  var sYM=S.calSel.slice(0,7);var cYM=vy+'-'+pad(vm+1);
  var selEvs=[];
  if(sYM===cYM){
    S.orders.filter(function(o){return o.ngayXuat===S.calSel&&o.status!=='da_giao'&&o.status!=='huy';}).forEach(function(o){selEvs.push({k:'po',t:o.name,sub:'NCC '+o.ncc});});
    S.tasks.filter(function(t){return t.due===S.calSel&&!t.done;}).forEach(function(t){selEvs.push({k:'task',t:t.title,sub:t.ncc?'NCC '+t.ncc:'Nội bộ'});});
  }

  var wdHtml=WDS.map(function(w){return '<div style="text-align:center;font-size:11.5px;font-weight:700;color:#a1a1aa;text-transform:uppercase">'+w+'</div>';}).join('');
  var cells='';
  for(var i=0;i<off;i++)cells+='<div></div>';
  for(var d=1;d<=dim;d++){
    var iso=vy+'-'+pad(vm+1)+'-'+pad(d);
    var isT=iso===TODAY;var isSel=iso===S.calSel;var evs=bk[d]||[];

    var isImp=(S.calImportant||[]).indexOf(iso)>=0;
    var bg='#fafafa',bc='transparent',dc='#52525b';
    if(isSel){bg=AS;bc=AC;dc=AC;}else if(isImp){bg='#fef9c3';bc='#fbbf24';}else if(isT){bg='rgba(214,86,0,0.06)';dc=AC;}
    var dots='';
    if(evs.length){dots='<div style="display:flex;align-items:center;gap:6px;margin-top:auto;padding-top:3px">';
      if(ovN)dots+='<span style="font-size:11px;font-weight:800;color:#dc2626;display:inline-flex;align-items:center;gap:3px"><span style="width:7px;height:7px;border-radius:50%;background:#dc2626"></span>'+ovN+'</span>';
      if(oN)dots+='<span style="font-size:11px;font-weight:800;color:#2563eb;display:inline-flex;align-items:center;gap:3px"><span style="width:7px;height:7px;border-radius:50%;background:#2563eb"></span>'+oN+'</span>';
      if(tN)dots+='<span style="font-size:11px;font-weight:800;color:#16a34a;display:inline-flex;align-items:center;gap:3px"><span style="width:7px;height:7px;border-radius:50%;background:#16a34a"></span>'+tN+'</span>';
      dots+='</div>';}

    var starBtn='<span class="cal-star" data-iso="'+iso+'" style="position:absolute;top:4px;right:4px;font-size:12px;cursor:pointer;line-height:1;opacity:'+(isImp?'1':'0.18')+'" title="Đánh dấu quan trọng">⭐</span>';
    cells+='<div class="cal-day" data-iso="'+iso+'" style="position:relative;min-height:84px;display:flex;flex-direction:column;gap:2px;padding:7px 20px 6px 7px;border-radius:10px;cursor:pointer;border:1px solid '+bc+';background:'+bg+';overflow:hidden"><span style="font-size:13px;font-weight:700;color:'+dc+'">'+d+'</span>'+firstEv+dots+starBtn+'</div>';
  }

/* =================== HELPERS MỚI =================== */
function fmtMoney(n){n=Number(n)||0;return n.toLocaleString('vi-VN');}
function updNcc(id,patch){for(var i=0;i<S.ncc.length;i++){if(S.ncc[i].id===id){for(var k in patch)S.ncc[i][k]=patch[k];}}save();}
function updQuote(id,patch){for(var i=0;i<S.quotes.length;i++){if(S.quotes[i].id===id){for(var k in patch)S.quotes[i][k]=patch[k];}}save();}
function nccName(id){var n=S.ncc.filter(function(x){return x.id===id;})[0];return n?n.name:'';}
function hbars(rows){var max=Math.max.apply(null,rows.map(function(r){return r.val;}).concat([1]));
  if(!rows.length)return '<div style="padding:20px;text-align:center;color:#b4b4b8;font-size:13px;font-weight:600">Chưa có dữ liệu</div>';
  return rows.map(function(r){var w=Math.round(r.val/max*100);
    return '<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;font-size:12.5px;font-weight:700;margin-bottom:5px;gap:10px"><span style="color:#3f3f46;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0">'+esc(r.label)+'</span><span style="color:'+(r.color||AC)+';flex-shrink:0">'+r.disp+'</span></div><div style="height:10px;background:#f1f1f2;border-radius:6px;overflow:hidden"><div style="height:100%;width:'+w+'%;background:'+(r.color||AC)+';border-radius:6px"></div></div></div>';}).join('');
}

function renderQuotesCompare(){
  var groups={};
  quotesFiltered().forEach(function(q){var key=(q.item||'(không tên)').trim().toLowerCase();if(!groups[key])groups[key]={name:q.item||'(không tên)',items:[]};groups[key].items.push(q);});
  var keys=Object.keys(groups);
  if(keys.length===0)return '<div class="card" style="padding:48px;text-align:center;color:#a1a1aa;font-size:14px;font-weight:600">Chưa có dữ liệu để so sánh.</div>';
  var html=keys.map(function(k){var g=groups[k];
    var sorted=g.items.slice().sort(function(a,b){return (Number(a.price)||0)-(Number(b.price)||0);});
    var min=Number(sorted[0].price)||0;
    var rows=sorted.map(function(q,idx){var best=idx===0&&g.items.length>1;var p=Number(q.price)||0;
      var pct=min>0&&p>min?' (+'+Math.round((p-min)/min*100)+'%)':'';
      return '<div class="q-open" data-id="'+q.id+'" style="display:flex;align-items:center;gap:12px;padding:11px 16px;border-top:1px solid #f5f5f4;cursor:pointer;background:'+(best?'#e3f6ec':'transparent')+'">'+
        (best?'<span style="font-size:10px;font-weight:800;color:#047857;background:#c9efd8;padding:2px 7px;border-radius:10px;flex-shrink:0">RẺ NHẤT</span>':'<span style="width:7px;height:7px;border-radius:50%;background:#d4d4d8;flex-shrink:0;margin:0 12px"></span>')+
        '<span style="flex:1;font-size:13.5px;font-weight:700;color:#27272a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0">'+esc(nccName(q.nccId)||q.nccText||'(NCC?)')+'</span>'+
        '<span style="font-size:12px;color:#dc2626;font-weight:700;flex-shrink:0">'+pct+'</span>'+
        '<span style="font-size:14px;font-weight:800;color:'+(best?'#047857':'#3f3f46')+';flex-shrink:0">'+fmtMoney(q.price)+'<span style="font-size:11px;color:#a1a1aa;font-weight:600">/'+esc(q.unit||'đv')+'</span></span></div>';
    }).join('');
    return '<div class="card" style="overflow:hidden;margin-bottom:14px"><div style="padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between"><div style="font-size:15px;font-weight:800">'+esc(g.name)+'</div><span style="font-size:12px;font-weight:700;color:#71717a">'+g.items.length+' NCC</span></div>'+rows+'</div>';
  }).join('');
  return '<div>'+html+'</div>';
}

function updOrder(id,patch){for(var i=0;i<S.orders.length;i++){if(S.orders[i].id===id){for(var k in patch)S.orders[i][k]=patch[k];}}save();}

/* ===== ĐÍNH KÈM FILE ===== */
// Giới hạn fallback (khi CHƯA bật Firebase Storage): file nhúng thẳng vào dữ liệu, tối đa ~900KB/file.
var FILE_FALLBACK_MAX=900000;
// Đặt true SAU KHI đã nâng cấp Blaze + bật Firebase Storage. Để false: file nhỏ nhúng base64, file lớn dùng link.
var USE_STORAGE=false;
function addOrderFiles(orderId,fileList){
  var ord=S.orders.filter(function(o){return o.id===orderId;})[0];if(!ord)return;if(!ord.files)ord.files=[];
  var files=Array.prototype.slice.call(fileList);
  files.forEach(function(file){
    if(USE_STORAGE&&FB.user&&FB.storage){
      // Tải lên Firebase Storage → giới hạn lớn (mặc định tối đa nhiều GB), chỉ lưu link trong dữ liệu.
      var fid=S.nid++;
      var entry={id:fid,name:file.name,size:file.size,type:file.type||'',uploading:true};
      ord.files.push(entry);render();
      var safe=String(file.name).replace(/[^\w.\-]+/g,'_');
      var path='attachments/'+FB.user.uid+'/'+orderId+'/'+fid+'_'+safe;
      var ref=FB.storage.ref(path);
      ref.put(file).then(function(){return ref.getDownloadURL();}).then(function(url){
        entry.uploading=false;entry.url=url;entry.path=path;save();render();
      }).catch(function(e){
        // Xóa entry lỗi
        var i=ord.files.indexOf(entry);if(i>=0)ord.files.splice(i,1);render();
        alert('Không tải được file "'+file.name+'" lên Storage.\n'+((e&&e.code)||'')+'\nKiểm tra: đã bật Storage trong Firebase Console & đã đặt Rules cho phép người đăng nhập.');
      });
    }else{
      // Fallback: nhúng base64 (giới hạn ~900KB/file). Để tăng giới hạn, hãy đăng nhập + bật Firebase Storage.
      if(file.size>FILE_FALLBACK_MAX){alert('File "'+file.name+'" ('+fmtSize(file.size)+') vượt giới hạn '+fmtSize(FILE_FALLBACK_MAX)+'.\nĐăng nhập và bật Firebase Storage để đính kèm file lớn.');return;}
      var rd=new FileReader();
      rd.onload=function(){ord.files.push({id:S.nid++,name:file.name,size:file.size,type:file.type||'',data:rd.result});save();render();};
      rd.readAsDataURL(file);
    }
  });
}
function downloadFile(f){
  if(f.uploading){alert('File đang tải lên, vui lòng đợi một chút.');return;}
  if(f.isLink){window.open(f.url,'_blank');return;}
  if(f.url){
    // Tải về từ Storage (ép tải xuống để xem được offline)
    fetch(f.url).then(function(r){return r.blob();}).then(function(blob){
      var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=f.name||'tai-lieu';a.click();setTimeout(function(){URL.revokeObjectURL(a.href);},2000);
    }).catch(function(){window.open(f.url,'_blank');});
  }else if(f.data){
    var a=document.createElement('a');a.href=f.data;a.download=f.name||'tai-lieu';a.click();
  }else{alert('File này không có dữ liệu để tải.');}
}

  var dli=el('drawer-link-input');if(dli)dli.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();addLink();}});
  on('.dr-file-open','click',function(){var idx=+this.getAttribute('data-idx');var ord=S.orders.filter(function(o){return o.id===S.oOpen;})[0];if(!ord||!ord.files||!ord.files[idx])return;downloadFile(ord.files[idx]);});
  on('.dr-file-del','click',function(){var idx=+this.getAttribute('data-idx');var ord=S.orders.filter(function(o){return o.id===S.oOpen;})[0];if(!ord||!ord.files)return;if(!confirm('Xóa file "'+(ord.files[idx]?ord.files[idx].name:'')+'"?'))return;var f=ord.files[idx];if(f.path&&FB.storage){FB.storage.ref(f.path).delete().catch(function(){});}ord.files.splice(idx,1);save();render();});
  // ===== Drawer NCC =====
  on('.ncc-field','input',function(){var f=this.getAttribute('data-field');var o=S.ncc.filter(function(n){return n.id===S.nccOpen;})[0];if(!o)return;o[f]=this.value;save();});
  var ncbg=el('ncc-bg');if(ncbg)ncbg.addEventListener('click',function(){S.nccOpen=null;render();});
  var ncc=el('ncc-close');if(ncc)ncc.addEventListener('click',function(){S.nccOpen=null;render();});
  var ncdel=el('ncc-del');if(ncdel)ncdel.addEventListener('click',function(){if(!isAdmin())return;var id=S.nccOpen;if(!confirm('Xóa NCC này? Báo giá liên quan vẫn được giữ.'))return;S.ncc=S.ncc.filter(function(n){return n.id!==id;});S.nccOpen=null;save();render();});
  // ===== Drawer Báo giá =====
  on('.q-field','input',function(){var f=this.getAttribute('data-field');var o=S.quotes.filter(function(q){return q.id===S.qOpen;})[0];if(!o)return;o[f]=f==='nccId'?(this.value?+this.value:''):this.value;save();});
  on('.q-field','change',function(){var f=this.getAttribute('data-field');var o=S.quotes.filter(function(q){return q.id===S.qOpen;})[0];if(!o)return;o[f]=f==='nccId'?(this.value?+this.value:''):this.value;save();});
  var qbg=el('q-bg');if(qbg)qbg.addEventListener('click',function(){S.qOpen=null;render();});
  var qcl=el('q-close');if(qcl)qcl.addEventListener('click',function(){S.qOpen=null;render();});
  var qdel=el('q-del');if(qdel)qdel.addEventListener('click',function(){if(!isAdmin())return;var id=S.qOpen;if(!confirm('Xóa báo giá này?'))return;S.quotes=S.quotes.filter(function(q){return q.id!==id;});S.qOpen=null;save();render();});
  // ===== Panel thành viên =====
  var mbg=el('mem-bg');if(mbg)mbg.addEventListener('click',function(){S.membersOpen=false;render();});
  var mcl=el('mem-close');if(mcl)mcl.addEventListener('click',function(){S.membersOpen=false;render();});
  on('.mem-role','change',function(){if(!isAdmin())return;var uid=this.getAttribute('data-uid');if(S.members[uid]){
    if(this.value!=='admin'&&S.members[uid].role==='admin'){var admins=Object.keys(S.members).filter(function(u){return S.members[u].role==='admin';});if(admins.length<=1){alert('Phải có ít nhất 1 admin.');render();return;}}
    S.members[uid].role=this.value;computeRole();save();render();}});
  on('.mem-del','click',function(){if(!isAdmin())return;var uid=this.getAttribute('data-uid');if(!S.members[uid])return;if(!confirm('Gỡ thành viên "'+(S.members[uid].name||S.members[uid].email)+'" khỏi team?'))return;delete S.members[uid];save();render();});
  // deadline prompt
  var dlbg=el('dl-bg');if(dlbg)dlbg.addEventListener('click',function(){S.dlPrompt=null;render();});
  var dls=el('dl-skip');if(dls)dls.addEventListener('click',function(){S.dlPrompt=null;render();});
  var dlsave=el('dl-save');if(dlsave)dlsave.addEventListener('click',function(){var v=el('dl-date').value;if(v)updTask(S.dlPrompt.id,{due:v});S.dlPrompt=null;render();});
  // account / login (Firebase)
  var syb=el('sync-btn');if(syb)syb.addEventListener('click',function(){LOGIN.err='';SYNC_OPEN=true;render();});
  if(SYNC_OPEN){
    function closeS(){SYNC_OPEN=false;LOGIN.err='';render();}
    var sclose=el('sync-close');if(sclose)sclose.addEventListener('click',closeS);
    var sbg=el('sync-bg');if(sbg)sbg.addEventListener('click',closeS);
    function authErr(e){
      var c=e&&e.code||'';
      if(c.indexOf('email-already-in-use')>=0)return'Email này đã có tài khoản. Hãy bấm Đăng nhập.';
      if(c.indexOf('invalid-email')>=0)return'Email không hợp lệ.';
      if(c.indexOf('weak-password')>=0)return'Mật khẩu quá ngắn (tối thiểu 6 ký tự).';
      if(c.indexOf('wrong-password')>=0||c.indexOf('invalid-credential')>=0)return'Sai email hoặc mật khẩu.';
      if(c.indexOf('user-not-found')>=0)return'Chưa có tài khoản này. Hãy bấm Tạo tài khoản.';
      if(c.indexOf('network')>=0)return'Lỗi mạng. Kiểm tra kết nối rồi thử lại.';
      if(c.indexOf('operation-not-allowed')>=0)return'Chưa bật Email/Password trong Firebase Authentication.';
      return'Lỗi: '+(e&&e.message||'không xác định');
    }
    function readCreds(){var em=el('auth-email'),pw=el('auth-pass');LOGIN.email=em?em.value.trim():'';return{email:LOGIN.email,pass:pw?pw.value:''};}
    function doAuth(mode){
      var cr=readCreds();LOGIN.err='';
      if(!cr.email||!cr.pass){LOGIN.err='Nhập đủ email và mật khẩu.';render();return;}
      var p=mode==='signup'?FB.auth.createUserWithEmailAndPassword(cr.email,cr.pass):FB.auth.signInWithEmailAndPassword(cr.email,cr.pass);
      p.then(function(){LOGIN.err='';/* onAuthStateChanged sẽ đóng & đồng bộ */}).catch(function(e){LOGIN.err=authErr(e);render();});
    }
    var alogin=el('auth-login');if(alogin)alogin.addEventListener('click',function(){doAuth('login');});
    var asignup=el('auth-signup');if(asignup)asignup.addEventListener('click',function(){doAuth('signup');});
    var apass=el('auth-pass');if(apass)apass.addEventListener('keydown',function(e){if(e.key==='Enter')doAuth('login');});
    var alogout=el('auth-logout');if(alogout)alogout.addEventListener('click',function(){if(!confirm('Đăng xuất khỏi máy này? Dữ liệu vẫn an toàn trên cloud.'))return;FB.auth.signOut();});
  }
}

// Re-render chỉ phần content (giữ focus cho input search)
function rerenderContent(){var c=el('content');if(c){c.innerHTML=renderContent();attachEvents();}}
function restoreFocus(id,pos){var n=el(id);if(n){n.focus();try{n.setSelectionRange(pos,pos);}catch(e){}}}

// Đóng menu khi click ra ngoài
document.addEventListener('click',function(e){
  var changed=false;
  if(S.oMenu!==null&&!e.target.closest('.ostatus-btn')&&!e.target.closest('.statusmenu')){S.oMenu=null;S.oMenuRect=null;changed=true;}
  if(S.tMenu!==null&&!e.target.closest('.tstatus-btn')&&!e.target.closest('.statusmenu')){S.tMenu=null;S.tMenuRect=null;changed=true;}
  if(S.wMenu&&!e.target.closest('#wcity-btn')&&!e.target.closest('.wcity-opt')){S.wMenu=false;changed=true;}
  if(S.calPicker&&!e.target.closest('#cal-picker-btn')&&!e.target.closest('.statusmenu')){S.calPicker=false;changed=true;}
  if(changed)render();
});

/* =================== INIT =================== */
load();
fbInit();
render();
</script>
</body>
</html>
